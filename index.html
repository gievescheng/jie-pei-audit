      </div>
    </div>
  );
}

// ─── 稽核計畫甘特圖 ────────────────────────────────────────────────────────────
function AuditGanttView({ auditPlans, year, onClickPlan }) {
  const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const yearPlans = (auditPlans || []).filter(p => String(p.year) === String(year));
  const depts = [...new Set(yearPlans.map(p => p.dept).filter(Boolean))];
  const statusColor = s => s==="已完成"?"#22c55e":s==="執行中"?"#60a5fa":s==="計畫中"?"#f97316":"#ef4444";

  if (yearPlans.length === 0) {
    return <div style={{ textAlign:"center", color:"#475569", padding:"40px 0", fontSize:13 }}>{year} 年沒有稽核計畫資料。</div>;
  }

  return (
    <div style={{ overflowX:"auto" }}>
      <div style={{ minWidth:700, fontFamily:"'Noto Sans TC', sans-serif" }}>
        {/* 月份標題列 */}
        <div style={{ display:"flex", marginBottom:4, paddingLeft:90 }}>
          {MONTHS.map(m => (
            <div key={m} style={{ flex:1, textAlign:"center", fontSize:10, color:"#475569", fontWeight:600, borderLeft:"1px solid rgba(255,255,255,0.05)", padding:"4px 0" }}>{m}</div>
          ))}
        </div>
        {/* 每個部門一列 */}
        {depts.map(dept => {
          const plans = yearPlans.filter(p => p.dept === dept);
          return (
            <div key={dept} style={{ display:"flex", alignItems:"center", marginBottom:6, minHeight:36 }}>
              <div style={{ width:88, flexShrink:0, fontSize:11, color:"#94a3b8", fontWeight:600, textAlign:"right", paddingRight:10, whiteSpace:"nowrap" }}>{dept}</div>
              <div style={{ flex:1, position:"relative", height:36, background:"rgba(255,255,255,0.02)", borderRadius:4 }}>
                {/* 月份分隔線 */}
                {MONTHS.map((_, i) => (
                  <div key={i} style={{ position:"absolute", left:`${(i/12)*100}%`, top:0, bottom:0, width:1, background:"rgba(255,255,255,0.04)" }} />
                ))}
                {/* 計畫橫條 */}
                {plans.map((plan, pi) => {
                  const d = plan.scheduledDate ? new Date(plan.scheduledDate) : null;
                  if (!d || isNaN(d)) return null;
                  const month0 = d.getMonth(); // 0-11
                  const day = d.getDate();     // 1-31
                  const leftPct = ((month0 + (day - 1) / 30) / 12) * 100;
                  const topOffset = pi * 14; // 同部門多筆計畫垂直堆疊
                  return (
                    <button key={plan.id} onClick={() => onClickPlan(plan)} title={`${plan.id}　${plan.dept}　${plan.scheduledDate}　${plan.status}`}
                      style={{
                        position:"absolute", left:`${leftPct}%`, top: topOffset,
                        width:"7.5%", height:11, borderRadius:3,
                        background:`linear-gradient(90deg,${statusColor(plan.status)},${statusColor(plan.status)}99)`,
                        border:"none", cursor:"pointer", padding:0,
                        boxShadow:`0 1px 4px ${statusColor(plan.status)}55`,
                        transition:"transform 0.15s",
                      }}
                      onMouseEnter={e => e.currentTarget.style.transform="scaleY(1.5)"}
                      onMouseLeave={e => e.currentTarget.style.transform="scaleY(1)"}
                    />
                  );
                })}
              </div>
            </div>
          );
        })}
        {/* 圖例 */}
        <div style={{ display:"flex", gap:16, paddingLeft:90, marginTop:12, flexWrap:"wrap" }}>
          {[["計畫中","#f97316"],["執行中","#60a5fa"],["已完成","#22c55e"],["取消","#ef4444"]].map(([label,color]) => (
            <div key={label} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#64748b" }}>
              <div style={{ width:20, height:8, borderRadius:2, background:color }} />
              {label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── NC CAPA 進度面板 ─────────────────────────────────────────────────────────
function NcCapaPanel({ nc }) {
  const steps = [
    { label: "開立",     done: () => true },
    { label: "根因分析", done: () => !!(nc.rootCause && nc.rootCause.trim()) },
    { label: "改善措施", done: () => !!(nc.correctiveAction && nc.correctiveAction.trim()) },
    { label: "效果確認", done: () => !!(nc.verifyDate && nc.verifyDate.trim()) },
    { label: "結案",     done: () => nc.status === "已關閉" },
  ];
  const doneCount = steps.filter(s => s.done()).length;
  const pct = Math.round((doneCount / steps.length) * 100);
  return (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"14px 16px", marginBottom:6 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:12, color:"#c4b5fd", fontWeight:700, letterSpacing:0.5 }}>CAPA 改善流程</div>
        <div style={{ fontSize:11, color: pct===100?"#22c55e":"#94a3b8" }}>{doneCount}/{steps.length} 完成 ({pct}%)</div>
      </div>
      {/* 步驟列 */}
      <div style={{ display:"flex", alignItems:"center", gap:0 }}>
        {steps.map((s, i) => {
          const isDone = s.done();
          return (
            <React.Fragment key={s.label}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flex:1 }}>
                <div style={{
                  width:28, height:28, borderRadius:"50%",
                  background: isDone ? "linear-gradient(135deg,#059669,#10b981)" : "rgba(255,255,255,0.08)",
                  border: isDone ? "none" : "2px solid rgba(255,255,255,0.15)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:13, color:"#fff", fontWeight:700, flexShrink:0,
                }}>
                  {isDone ? "✓" : i+1}
                </div>
                <div style={{ fontSize:10, color: isDone?"#4ade80":"#64748b", marginTop:4, textAlign:"center", whiteSpace:"nowrap" }}>{s.label}</div>
              </div>
              {i < steps.length - 1 && (
                <div style={{ flex:0.5, height:2, background: s.done() && steps[i+1].done() ? "#10b981" : "rgba(255,255,255,0.1)", marginBottom:16, marginTop:0 }} />
              )}
            </React.Fragment>
          );
        })}
      </div>
      {/* 整體進度條 */}
      <div style={{ marginTop:10, background:"rgba(255,255,255,0.06)", borderRadius:4, height:4, overflow:"hidden" }}>
        <div style={{ width:`${pct}%`, height:"100%", background:"linear-gradient(90deg,#6366f1,#22c55e)", transition:"width 0.4s ease", borderRadius:4 }} />
      </div>
    </div>
  );
}

// ─── NON-CONFORMANCE TAB (MP-15) ─────────────────────────────────────────────
function NonConformanceTab({ nonConformances: items, setNonConformances: setItems, highlightNcId, onHighlightDone, ncPrefill, setNcPrefill }) {
  const emptyDraft = { id:"", date:"", dept:"", type:"製程異常", description:"", severity:"輕微", rootCause:"", correctiveAction:"", responsible:"", dueDate:"", status:"待處理", closeDate:"", effectiveness:"", verifyDate:"", verifyBy:"", product_id:"", product_name:"", wo_id:"", wo_no:"", audit_plan_id:"" };
  const [modal, setModal] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState(emptyDraft);
  const [message, setMessage] = useState("");
  const [busy, setBusy] = useState("");
  const [importDraft, setImportDraft] = useState(null);
  const [importMissing, setImportMissing] = useState([]);
  const [erpProducts, setErpProducts] = useState([]);
  const [erpWorkOrders, setErpWorkOrders] = useState([]);
  const [showCharts, setShowCharts] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [bulkStatus, setBulkStatus] = useState("處理中");
  const rowRefs = useRef({});

  useEffect(() => {
    if (!showAdd) return;
    fetchErpList("products").then(setErpProducts);
    fetchErpList("work-orders").then(setErpWorkOrders);
  }, [showAdd]);

  useEffect(() => {
    if (!ncPrefill) return;
    setDraft({ ...emptyDraft, ...ncPrefill });
    setShowAdd(true);
    setNcPrefill?.(null);
  }, [ncPrefill]);

  useEffect(() => {
    if (!highlightNcId) return;
    const el = rowRefs.current[highlightNcId];
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.style.outline = "2px solid #f59e0b";
      el.style.outlineOffset = "3px";
      el.style.transition = "outline 0.2s";
      const t = setTimeout(() => {
        el.style.outline = "";
        el.style.outlineOffset = "";
        onHighlightDone?.();
      }, 2500);
      return () => clearTimeout(t);
    }
  }, [highlightNcId]);

  const statusColor = s => s==="已關閉"?"#22c55e":s==="處理中"?"#f97316":s==="待處理"?"#ef4444":s==="待驗收"?"#eab308":"#94a3b8";
  const sevColor = s => s==="重大"?"#ef4444":s==="中度"?"#eab308":"#60a5fa";
  const enriched = items.map(item => ({ ...item, overdue: item.status !== "已關閉" && daysUntil(item.dueDate) < 0 }));

  async function persistRecord(record, doneMessage) {
    setBusy("save");
    setMessage("");
    try {
      const payload = await apiJson("/api/nonconformances", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ record }),
      });
      setItems(payload.items || []);
      setMessage(doneMessage);
      return true;
    } catch (err) {
      setMessage("存檔失敗：" + err.message);
      return false;
    } finally {
      setBusy("");
    }
  }

  async function addRecord() {
    const ok = await persistRecord(draft, "已新增不符合報告。");
    if (!ok) return;
    setShowAdd(false);
    setDraft(emptyDraft);
  }

  async function markPendingVerify(item) {
    const ok = await persistRecord({ ...item, status: "待驗收" }, "已標記為待驗收。");
    if (ok) setModal(prev => prev ? { ...prev, status:"待驗收" } : null);
  }

  async function closeRecord(item) {
    const ok = await persistRecord({ ...item, status: "已關閉", closeDate: new Date().toISOString().split("T")[0], effectiveness: item.effectiveness || "有效" }, "已更新為結案。");
    if (ok) setModal(null);
  }

  async function handleBulkStatus() {
    const size = selectedIds.size;
    for (const id of [...selectedIds]) {
      const item = items.find(n => n.id === id);
      if (item) await persistRecord({ ...item, status: bulkStatus }, "");
    }
    setSelectedIds(new Set());
    setMessage(`已批量更新 ${size} 筆狀態為「${bulkStatus}」。`);
  }
  async function handleBulkClose() {
    const today = new Date().toISOString().split("T")[0];
    const size = selectedIds.size;
    for (const id of [...selectedIds]) {
      const item = items.find(n => n.id === id);
      if (item && item.status !== "已關閉") await persistRecord({ ...item, status:"已關閉", closeDate: today }, "");
    }
    setSelectedIds(new Set());
    setMessage(`已批量關閉 ${size} 筆。`);
  }

  async function deleteRecord(id) {
    if (!window.confirm("確定要刪除這筆不符合報告嗎？")) return;
    setBusy("delete");
    setMessage("");
    try {
      const payload = await apiJson("/api/nonconformances/" + encodeURIComponent(id), { method: "DELETE" });
      setItems(payload.items || []);
      setModal(null);
      setMessage("已刪除不符合報告。");
    } catch (err) {
      setMessage("刪除失敗：" + err.message);
    } finally {
      setBusy("");
    }
  }

  async function importFile(file) {
    if (!file) return;
    setBusy("import");
    setMessage("");
    try {
      const formData = new FormData();
      formData.append("file", file);
      const payload = await apiJson("/api/nonconformances/import", { method: "POST", body: formData });
      setImportDraft(payload.draft || null);
      setImportMissing(payload.missing_fields || []);
      setMessage("已讀取檔案，請確認資料後再存入。");
    } catch (err) {
      setMessage("匯入失敗：" + err.message);
    } finally {
      setBusy("");
    }
  }

  async function confirmImport() {
    if (!importDraft) return;
    const ok = await persistRecord(importDraft, "已匯入不符合報告。");
    if (!ok) return;
    setImportDraft(null);
    setImportMissing([]);
  }

  return (
    <div>
      <SectionHeader title="不符合管理（MP-15）" count={items.length} color="#f87171" />
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <StatCard label="待處理" value={items.filter(item=>item.status==="待處理").length} color="#ef4444" sub="尚未開始" />
        <StatCard label="處理中" value={items.filter(item=>item.status==="處理中").length} color="#f97316" sub="追蹤中" />
        <StatCard label="待驗收" value={items.filter(item=>item.status==="待驗收").length} color="#eab308" sub="等待效果確認" />
        <StatCard label="已關閉" value={items.filter(item=>item.status==="已關閉").length} color="#22c55e" sub="已完成" />
        <StatCard label="已逾期" value={enriched.filter(item=>item.overdue).length} color="#ef4444" sub="需優先處理" />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, marginBottom:14, flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <label style={{ display:"flex", alignItems:"center", gap:6, color:"#94a3b8", fontSize:13, cursor:"pointer", userSelect:"none" }}>
            <input type="checkbox" checked={selectedIds.size === items.length && items.length > 0} onChange={e => setSelectedIds(e.target.checked ? new Set(items.map(i=>i.id)) : new Set())} style={{ width:15, height:15, cursor:"pointer", accentColor:"#6366f1" }} />
            全選
          </label>
          <div style={{ color:"#fca5a5", fontSize:12 }}>{message || "可刪除錯誤資料，也可上傳報告檔先解析再確認。"}</div>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <button onClick={() => setShowCharts(v => !v)} style={{ background: showCharts ? "rgba(167,139,250,0.2)" : "rgba(255,255,255,0.06)", border:`1px solid ${showCharts?"rgba(167,139,250,0.5)":"rgba(255,255,255,0.12)"}`, borderRadius:10, color: showCharts ? "#c4b5fd" : "#e2e8f0", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>統計分析</button>
          <button onClick={() => exportToCsv(items, { id:"編號", date:"日期", dept:"部門", type:"類型", severity:"嚴重度", description:"問題描述", status:"狀態", responsible:"責任人", dueDate:"到期日", verifyDate:"驗收日期", verifyBy:"驗收人" }, "不符合項目.csv")} style={{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:10, color:"#4ade80", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>匯出 CSV</button>
          <label style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, color:"#e2e8f0", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>
            {busy==="import" ? "讀取中..." : "上傳報告檔"}
            <input type="file" accept=".docx,.xlsx,.pdf" onChange={e => importFile(e.target.files && e.target.files[0])} style={{ display:"none" }} />
          </label>
          <button onClick={() => setShowAdd(true)} style={{ background: "linear-gradient(135deg, #dc2626, #ef4444)", border: "none", borderRadius: 10, color: "#fff", cursor: "pointer", padding: "9px 18px", fontSize: 13, fontWeight: 700 }}>新增報告</button>
        </div>
      </div>
      {showCharts && <NcChartPanel items={items} />}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {enriched.map(item => (
          <div key={item.id} ref={el => { rowRefs.current[item.id] = el; }} style={{ background: item.overdue?"rgba(239,68,68,0.12)":selectedIds.has(item.id)?"rgba(99,102,241,0.08)":"rgba(255,255,255,0.03)", border: `1px solid ${item.overdue?"rgba(239,68,68,0.3)":selectedIds.has(item.id)?"rgba(99,102,241,0.4)":"rgba(255,255,255,0.08)"}`, borderRadius: 12, padding: "14px 18px" }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
              <input type="checkbox" checked={selectedIds.has(item.id)} onChange={e => setSelectedIds(prev => { const s = new Set(prev); e.target.checked ? s.add(item.id) : s.delete(item.id); return s; })} style={{ width:15, height:15, cursor:"pointer", accentColor:"#6366f1", marginTop:3, flexShrink:0 }} />
              <div style={{ flex: 1, minWidth: 260 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6, flexWrap: "wrap" }}>
                  <span style={{ fontWeight: 700, color: "#60a5fa", fontFamily: "monospace", fontSize: 13 }}>{item.id}</span>
                  <Badge color={sevColor(item.severity)}>{item.severity}</Badge>
                  <Badge color={statusColor(item.status)}>{item.status}</Badge>
                  {item.overdue && <Badge color="#ef4444">已逾期</Badge>}
                </div>
                <div style={{ color: "#e2e8f0", fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{item.description}</div>
                <div style={{ fontSize: 12, color: "#64748b" }}>{item.dept} · {item.type} · 發生日 {formatDate(item.date)} · 責任人 {item.responsible || "未填"}</div>
              </div>
              <div style={{ textAlign: "right", minWidth: 120 }}>
                <div style={{ fontSize: 12, color: "#64748b" }}>到期日</div>
                <div style={{ fontWeight: 700, color: item.overdue?"#ef4444":"#e2e8f0", fontSize: 13 }}>{formatDate(item.dueDate)}</div>
                {item.status==="已關閉" && <div style={{ fontSize: 11, color: "#4ade80", marginTop: 4 }}>結案 {formatDate(item.closeDate)}</div>}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => setModal(item)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, color: "#94a3b8", cursor: "pointer", padding: "6px 14px", fontSize: 12 }}>詳情</button>
                <button onClick={() => deleteRecord(item.id)} style={{ background:"rgba(239,68,68,0.14)", border:"1px solid rgba(239,68,68,0.28)", borderRadius:8, color:"#fca5a5", cursor:"pointer", padding:"6px 14px", fontSize:12 }}>刪除</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {selectedIds.size > 0 && (
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", zIndex:500, background:"#1e293b", border:"1px solid rgba(99,102,241,0.4)", borderRadius:16, padding:"12px 20px", display:"flex", alignItems:"center", gap:12, boxShadow:"0 8px 32px rgba(0,0,0,0.5)", flexWrap:"wrap" }}>
          <span style={{ color:"#a5b4fc", fontWeight:700, fontSize:14 }}>已選 {selectedIds.size} 筆</span>
          <select value={bulkStatus} onChange={e => setBulkStatus(e.target.value)} style={{ background:"#0f172a", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, color:"#e2e8f0", padding:"6px 8px", fontSize:13 }}>
            {["待處理","處理中","待驗收","已關閉"].map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <button onClick={handleBulkStatus} style={{ background:"rgba(99,102,241,0.2)", border:"1px solid rgba(99,102,241,0.4)", borderRadius:8, color:"#a5b4fc", cursor:"pointer", padding:"7px 14px", fontSize:13, fontWeight:600 }}>批量更新</button>
          <button onClick={handleBulkClose} style={{ background:"rgba(34,197,94,0.15)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:8, color:"#4ade80", cursor:"pointer", padding:"7px 14px", fontSize:13, fontWeight:600 }}>批量關閉</button>
          <button onClick={() => setSelectedIds(new Set())} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, color:"#64748b", cursor:"pointer", padding:"7px 14px", fontSize:13 }}>✕ 取消</button>
        </div>
      )}
      {modal && (
        <Modal title={`不符合報告：${modal.id}`} onClose={() => setModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {/* CAPA 進度面板 */}
            <NcCapaPanel nc={modal} />
            {/* 基本資料 */}
            {[["發生日",formatDate(modal.date)],["部門",modal.dept],["類型",modal.type],["嚴重度",modal.severity],["問題描述",modal.description],["原因分析",modal.rootCause||"（尚未填寫）"],["改善措施",modal.correctiveAction||"（尚未填寫）"],["責任人",modal.responsible],["到期日",formatDate(modal.dueDate)]].map(([k,v]) => (
              <div key={k} style={{ display:"flex", gap:12 }}>
                <div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>{k}</div>
                <div style={{ color: v && v.startsWith("（")?"#475569":"#e2e8f0", fontWeight:600, fontSize:13 }}>{v}</div>
              </div>
            ))}
            {/* 狀態列 */}
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>狀態</div>
              <Badge color={statusColor(modal.status)}>{modal.status}</Badge>
              {modal.status === "已關閉" && <span style={{ fontSize:11, color:"#4ade80" }}>結案 {formatDate(modal.closeDate)}</span>}
            </div>
            {/* 效果確認區 */}
            <div style={{ background:"rgba(234,179,8,0.06)", border:"1px solid rgba(234,179,8,0.2)", borderRadius:8, padding:"10px 14px" }}>
              <div style={{ fontSize:11, color:"#a16207", fontWeight:700, marginBottom:8, letterSpacing:0.5 }}>效果確認（Stage 4）</div>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                <div style={{ flex:1, minWidth:140 }}>
                  <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>確認日期</div>
                  <input type="date" value={modal.verifyDate||""} onChange={e => setModal(prev => ({...prev, verifyDate:e.target.value}))} style={{...inputStyle, fontSize:12}} />
                </div>
                <div style={{ flex:1, minWidth:120 }}>
                  <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>確認人員</div>
                  <input type="text" placeholder="輸入確認人員" value={modal.verifyBy||""} onChange={e => setModal(prev => ({...prev, verifyBy:e.target.value}))} style={{...inputStyle, fontSize:12}} />
                </div>
                <div style={{ flex:1, minWidth:120 }}>
                  <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>有效性</div>
                  <select value={modal.effectiveness||""} onChange={e => setModal(prev => ({...prev, effectiveness:e.target.value}))} style={{...inputStyle, fontSize:12}}>
                    <option value="">— 未評定 —</option>
                    <option>有效</option>
                    <option>部分有效</option>
                    <option>無效</option>
                  </select>
                </div>
              </div>
            </div>
            {/* ERP / 稽核連結 */}
            {(modal.audit_plan_id || modal.product_name || modal.wo_no) && (
              <div style={{ borderTop:"1px solid rgba(255,255,255,0.08)", paddingTop:12 }}>
                {modal.audit_plan_id && <div style={{ display:"flex", gap:12, marginBottom:6 }}><div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>來源稽核</div><div style={{ color:"#c4b5fd", fontWeight:700, fontSize:13, fontFamily:"monospace" }}>{modal.audit_plan_id}</div></div>}
                {modal.product_name && <div style={{ display:"flex", gap:12, marginBottom:6 }}><div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>關聯產品</div><div style={{ color:"#7dd3fc", fontWeight:600, fontSize:13 }}>{modal.product_name}</div></div>}
                {modal.wo_no && <div style={{ display:"flex", gap:12 }}><div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>關聯工單</div><div style={{ color:"#7dd3fc", fontWeight:600, fontSize:13 }}>{modal.wo_no}</div></div>}
              </div>
            )}
            {/* 操作按鈕 */}
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:4 }}>
              {/* 儲存效果確認欄位 */}
              <button onClick={() => persistRecord(modal, "效果確認已儲存。")} disabled={busy==="save"}
                style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:10, color:"#e2e8f0", cursor:"pointer", padding:"10px 20px", fontSize:13, fontWeight:700 }}>
                {busy==="save" ? "儲存中..." : "儲存變更"}
              </button>
              {/* 標記待驗收：處理中 且 根因+改善都填了 */}
              {modal.status === "處理中" && modal.rootCause && modal.correctiveAction && (
                <button onClick={() => markPendingVerify(modal)} style={{ background:"linear-gradient(135deg,#b45309,#d97706)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"10px 20px", fontSize:13, fontWeight:700 }}>
                  標記待驗收
                </button>
              )}
              {modal.status !== "已關閉" && (
                <button onClick={() => closeRecord(modal)} style={{ background:"linear-gradient(135deg,#059669,#10b981)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"10px 20px", fontSize:13, fontWeight:700 }}>
                  標記結案
                </button>
              )}
              <button onClick={() => deleteRecord(modal.id)} style={{ background:"rgba(239,68,68,0.14)", border:"1px solid rgba(239,68,68,0.28)", borderRadius:10, color:"#fca5a5", cursor:"pointer", padding:"10px 20px", fontSize:13, fontWeight:700 }}>
                刪除
              </button>
            </div>
          </div>
        </Modal>
      )}
      {showAdd && (<Modal title={draft.audit_plan_id ? `開立不符合報告（來自稽核 ${draft.audit_plan_id}）` : "新增不符合報告"} onClose={() => { setShowAdd(false); setDraft(emptyDraft); }}><div style={{ display:"flex", flexDirection:"column", gap:12 }}>{draft.audit_plan_id && <div style={{ background:"rgba(139,92,246,0.1)", border:"1px solid rgba(139,92,246,0.3)", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#c4b5fd" }}>此報告將連結至稽核計畫 <strong>{draft.audit_plan_id}</strong></div>}{[["發生日","date","date"],["部門","dept","text"],["問題描述","description","text"],["原因分析","rootCause","text"],["改善措施","correctiveAction","text"],["責任人","responsible","text"],["到期日","dueDate","date"]].map(([label,field,type]) => (<div key={field}><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>{label}</div><input type={type} value={draft[field]} onChange={e=>setDraft({...draft,[field]:e.target.value})} style={inputStyle} /></div>))}<div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>類型</div><select value={draft.type} onChange={e=>setDraft({...draft,type:e.target.value})} style={inputStyle}><option>製程異常</option><option>文件不符</option><option>人員作業</option><option>客戶投訴</option><option>量測異常</option><option>來料不合格</option></select></div><div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>嚴重度</div><select value={draft.severity} onChange={e=>setDraft({...draft,severity:e.target.value})} style={inputStyle}><option>輕微</option><option>中度</option><option>重大</option></select></div>
              <div style={{ borderTop:"1px solid rgba(255,255,255,0.08)", paddingTop:12, marginTop:4 }}>
                <div style={{ fontSize:11, color:"#475569", marginBottom:10, letterSpacing:0.5 }}>ERP 連結（選填）</div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  <div>
                    <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>關聯產品</div>
                    <select value={draft.product_id} onChange={e => { const p = erpProducts.find(x => x.id === e.target.value); setDraft({...draft, product_id: e.target.value, product_name: p ? p.product_name : ""}); }} style={inputStyle}>
                      <option value="">— 不指定 —</option>
                      {erpProducts.map(p => <option key={p.id} value={p.id}>{p.product_code}　{p.product_name}</option>)}
                    </select>
                  </div>
                  <div>
                    <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>關聯工單</div>
                    <select value={draft.wo_id} onChange={e => { const w = erpWorkOrders.find(x => x.id === e.target.value); setDraft({...draft, wo_id: e.target.value, wo_no: w ? w.wo_no : ""}); }} style={inputStyle}>
                      <option value="">— 不指定 —</option>
                      {erpWorkOrders.map(w => <option key={w.id} value={w.id}>{w.wo_no}　[{w.wo_status}]</option>)}
                    </select>
                  </div>
                </div>
              </div>
              <button onClick={addRecord} disabled={busy==="save"} style={{ background:"linear-gradient(135deg,#dc2626,#ef4444)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"12px 24px", fontSize:15, fontWeight:700, marginTop:8, opacity:busy==="save"?0.6:1 }}>{busy==="save"?"存檔中...":"確認新增"}</button></div></Modal>)}
      {importDraft && (<Modal title="匯入預覽" onClose={() => { setImportDraft(null); setImportMissing([]); }}><div style={{ display:"flex", flexDirection:"column", gap:12 }}>{importMissing.length>0 && <div style={{ background:"rgba(250,204,21,0.1)", border:"1px solid rgba(250,204,21,0.24)", borderRadius:8, padding:10, color:"#fde68a", fontSize:12 }}>以下欄位未完整讀取：{importMissing.join("、")}，請先補齊。</div>}{[["發生日","date","date"],["部門","dept","text"],["問題描述","description","text"],["原因分析","rootCause","text"],["改善措施","correctiveAction","text"],["責任人","responsible","text"],["到期日","dueDate","date"]].map(([label,field,type]) => (<div key={field}><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>{label}</div><input type={type} value={importDraft[field]||""} onChange={e=>setImportDraft({...importDraft,[field]:e.target.value})} style={inputStyle} /></div>))}<div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>類型</div><select value={importDraft.type||"製程異常"} onChange={e=>setImportDraft({...importDraft,type:e.target.value})} style={inputStyle}><option>製程異常</option><option>文件不符</option><option>人員作業</option><option>客戶投訴</option><option>量測異常</option><option>來料不合格</option></select></div><div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>嚴重度</div><select value={importDraft.severity||"輕微"} onChange={e=>setImportDraft({...importDraft,severity:e.target.value})} style={inputStyle}><option>輕微</option><option>中度</option><option>重大</option></select></div><button onClick={confirmImport} disabled={busy==="save"} style={{ background:"linear-gradient(135deg,#dc2626,#ef4444)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"12px 24px", fontSize:15, fontWeight:700, marginTop:8, opacity:busy==="save"?0.6:1 }}>{busy==="save"?"存檔中...":"確認存入"}</button></div></Modal>)}
    </div>
  );
}

function AuditPlanTab({ auditPlans, setAuditPlans, nonConformances, onCreateNc }) {
  const [modal, setModal] = useState(null);
  const [filter, setFilter] = useState("all");
  const [message, setMessage] = useState("");
  const [busy, setBusy] = useState("");
  const [findingsEdit, setFindingsEdit] = useState(null); // null = 不在編輯；string = 編輯中數值
  const [attachments, setAttachments] = useState([]);
  const [attachmentBusy, setAttachmentBusy] = useState(false);
  const [importRecords, setImportRecords] = useState([]);
  const [showAutoGen, setShowAutoGen] = useState(false);
  const [showGantt, setShowGantt] = useState(false);
  const [ganttYear, setGanttYear] = useState(new Date().getFullYear());
  const _curYear = new Date().getFullYear();
  const [autoGenDraft, setAutoGenDraft] = useState({ year: _curYear, period: "上半年", startDate: "", auditor: "", selectedDepts: [] });

  const DEPT_ISO_MAP = [
    { dept: "管理部",  scope: "條款 4、5、6、9.3（組織情境、領導、規劃、管理審查）" },
    { dept: "品管課",  scope: "條款 7.1.5、8.6、9.1、9.2（監測設備、產品放行、績效評估、內部稽核）" },
    { dept: "生產部",  scope: "條款 8.5（生產與服務提供）" },
    { dept: "採購部",  scope: "條款 8.4（外部提供過程／產品／服務之管控）" },
    { dept: "業務部",  scope: "條款 8.2（產品與服務之要求）" },
    { dept: "倉儲部",  scope: "條款 8.5.4（防護）" },
    { dept: "研發部",  scope: "條款 8.3（設計與開發）" },
  ];

  function toggleAutoGenDept(deptObj) {
    setAutoGenDraft(prev => {
      const exists = prev.selectedDepts.some(d => d.dept === deptObj.dept);
      return { ...prev, selectedDepts: exists ? prev.selectedDepts.filter(d => d.dept !== deptObj.dept) : [...prev.selectedDepts, deptObj] };
    });
  }

  async function handleAutoGen() {
    const { year, period, startDate, auditor, selectedDepts } = autoGenDraft;
    if (!startDate)         { setMessage("請輸入開始日期。"); return; }
    if (!auditor.trim())    { setMessage("請輸入稽核員姓名。"); return; }
    if (!selectedDepts.length) { setMessage("請至少選擇一個部門。"); return; }
    const records = selectedDepts.map((deptInfo, idx) => {
      const d = new Date(startDate);
      d.setDate(d.getDate() + idx * 7);
      return {
        year: String(year), period,
        scheduledDate: d.toISOString().split("T")[0],
        dept: deptInfo.dept, auditee: "", auditor: auditor.trim(),
        scope: deptInfo.scope, status: "計畫中", findings: 0, ncCount: 0,
      };
    });
    const ok = await persistRecords(records, `已自動產生 ${records.length} 筆稽核計畫。`);
    if (ok) setShowAutoGen(false);
  }

  function printAuditReport(plan) {
    const linkedNcs = (nonConformances || []).filter(nc => nc.audit_plan_id === plan.id);
    const html = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="utf-8"><title>稽核報告 ${plan.id}</title><style>
      body{font-family:"Noto Sans TC",sans-serif;margin:32px;color:#1e293b;font-size:13px}
      h1{font-size:20px;margin:0 0 4px}h2{font-size:14px;color:#475569;margin:24px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:4px}
      table{width:100%;border-collapse:collapse;margin-bottom:16px}
      td,th{border:1px solid #e2e8f0;padding:8px 12px;text-align:left;font-size:12px}th{background:#f8fafc;font-weight:700;color:#475569}
      .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
      .header{text-align:center;padding:16px;border:2px solid #1e293b;margin-bottom:24px}
      .sig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;margin-top:48px}
      .sig-box{border-top:1px solid #94a3b8;padding-top:8px;font-size:12px;color:#64748b}
      @media print{@page{margin:16mm}button{display:none}}
    </style></head><body>
    <div class="header">
      <div style="font-size:12px;color:#64748b">潔沛企業有限公司</div>
      <h1>ISO 9001:2015 內部稽核報告</h1>
      <div style="font-size:12px;color:#475569">依據 MP-09 內部稽核管理程序</div>
    </div>
    <h2>一、稽核計畫基本資料</h2>
    <table><tr><th>計畫編號</th><td>${plan.id}</td><th>年度／期別</th><td>${plan.year} ${plan.period}</td></tr>
    <tr><th>受稽部門</th><td>${plan.dept||'-'}</td><th>稽核員</th><td>${plan.auditor||'-'}</td></tr>
    <tr><th>受稽人</th><td>${plan.auditee||'-'}</td><th>預定日期</th><td>${plan.scheduledDate||'-'}</td></tr>
    <tr><th>實際日期</th><td>${plan.actualDate||'-'}</td><th>狀態</th><td>${plan.status}</td></tr>
    <tr><th colspan="4">稽核範圍</th></tr><tr><td colspan="4">${plan.scope||'-'}</td></tr></table>
    <h2>二、稽核發現（總計 ${plan.findings||0} 項，NC ${linkedNcs.length} 項）</h2>
    ${linkedNcs.length===0
      ? '<p style="color:#64748b">本次稽核無開立不符合報告。</p>'
      : `<table><thead><tr><th>NC 編號</th><th>問題描述</th><th>嚴重度</th><th>責任人</th><th>狀態</th></tr></thead><tbody>${
          linkedNcs.map(nc=>`<tr><td style="font-family:monospace">${nc.id}</td><td>${nc.description||''}</td><td>${nc.severity||''}</td><td>${nc.responsible||''}</td><td>${nc.status||''}</td></tr>`).join('')
        }</tbody></table>`
    }
    <h2>三、稽核結論</h2>
    <p style="min-height:60px;border:1px solid #e2e8f0;padding:8px;border-radius:4px">&nbsp;</p>
    <div class="sig">
      <div class="sig-box">稽核員簽名</div>
      <div class="sig-box">受稽部門主管確認</div>
      <div class="sig-box">品保主管審核</div>
    </div>
    <p style="text-align:right;color:#94a3b8;font-size:11px;margin-top:32px">列印日期：${new Date().toLocaleDateString("zh-TW")}</p>
    <button onclick="window.print()" style="position:fixed;bottom:24px;right:24px;padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">列印 / 匯出 PDF</button>
    </body></html>`;
    const w = window.open("", "_blank");
    w.document.write(html);
    w.document.close();
  }

  const statusColor = s => s==="已完成"?"#22c55e":s==="執行中"?"#60a5fa":s==="計畫中"?"#f97316":"#ef4444";
  const filtered = filter==="all" ? auditPlans : auditPlans.filter(item=>item.status===filter);
  const upcoming = auditPlans.filter(item=>item.status==="計畫中" && daysUntil(item.scheduledDate)<=30 && daysUntil(item.scheduledDate)>=0);

  useEffect(() => {
    let cancelled = false;
    async function loadAttachments() {
      if (!modal) {
        setAttachments([]);
        return;
      }
      setAttachmentBusy(true);
      try {
        const payload = await apiJson("/api/audit-plans/" + encodeURIComponent(modal.id) + "/attachments");
        if (!cancelled) setAttachments(payload.attachments || []);
      } catch (err) {
        if (!cancelled) {
          setAttachments([]);
          setMessage("附件讀取失敗：" + err.message);
        }
      } finally {
        if (!cancelled) setAttachmentBusy(false);
      }
    }
    loadAttachments();
    return () => { cancelled = true; };
  }, [modal && modal.id]);

  async function persistRecords(records, doneMessage) {
    setBusy("save");
    setMessage("");
    try {
      const payload = await apiJson("/api/audit-plans", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ records }),
      });
      setAuditPlans(payload.items || []);
      setMessage(doneMessage);
      return true;
    } catch (err) {
      setMessage("存檔失敗：" + err.message);
      return false;
    } finally {
      setBusy("");
    }
  }

  async function markInProgress(plan) {
    const today = new Date().toISOString().split("T")[0];
    const ok = await persistRecords([{ ...plan, status:"執行中", actualDate: plan.actualDate || today }], "已更新為「執行中」。");
    if (ok) setModal(prev => prev ? { ...prev, status:"執行中", actualDate: plan.actualDate || today } : null);
  }

  async function markComplete(plan) {
    const today = new Date().toISOString().split("T")[0];
    const computedNcCount = (nonConformances||[]).filter(nc => nc.audit_plan_id === plan.id).length;
    const ok = await persistRecords([{ ...plan, status:"已完成", actualDate: plan.actualDate || today, ncCount: computedNcCount }], "已更新稽核計畫。");
    if (ok) setModal(null);
  }

  async function saveFindingsCount(plan, newVal) {
    const num = parseInt(newVal, 10);
    if (isNaN(num) || num < 0) { setFindingsEdit(null); return; }
    const ok = await persistRecords([{ ...plan, findings: num }], "發現數已更新。");
    if (ok) {
      setModal(prev => prev ? { ...prev, findings: num } : null);
      setFindingsEdit(null);
    }
  }

  async function deletePlan(id) {
    if (!window.confirm("確定要刪除這筆稽核計畫嗎？")) return;
    setBusy("delete");
    try {
      const payload = await apiJson("/api/audit-plans/" + encodeURIComponent(id), { method:"DELETE" });
      setAuditPlans(payload.items || []);
      setModal(null);
      setMessage("已刪除稽核計畫。");
    } catch (err) {
      setMessage("刪除失敗：" + err.message);
    } finally {
      setBusy("");
    }
  }

  async function importPlanFile(file) {
    if (!file) return;
    setBusy("import");
    try {
      const formData = new FormData();
      formData.append("file", file);
      const payload = await apiJson("/api/audit-plans/import", { method:"POST", body:formData });
      setImportRecords(payload.records || []);
      setMessage((payload.records || []).length ? "已讀取稽核計畫檔，請確認後再存入。" : "檔案已上傳，但目前沒有辨識到可匯入的稽核計畫資料。請確認檔案內容是否已填寫。");
    } catch (err) {
      setMessage("匯入失敗：" + err.message);
    } finally {
      setBusy("");
    }
  }

  async function confirmImportPlans() {
    if (!importRecords.length) return;
    const records = importRecords.map(({ missing_fields, ...record }) => record);
    const ok = await persistRecords(records, "已匯入稽核計畫。");
    if (ok) setImportRecords([]);
  }

  function updateImportRecord(field, value) {
    if (importRecords.length !== 1) return;
    setImportRecords([{ ...importRecords[0], [field]: value }]);
  }

  return (
    <div>
      <SectionHeader title="稽核計畫（MP-09）" count={auditPlans.length} color="#8b5cf6" />
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <StatCard label="全部計畫" value={auditPlans.length} color="#8b5cf6" />
        <StatCard label="已完成" value={auditPlans.filter(item=>item.status==="已完成").length} color="#22c55e" />
        <StatCard label="執行中" value={auditPlans.filter(item=>item.status==="執行中").length} color="#60a5fa" />
        <StatCard label="30 天內到期" value={upcoming.length} color="#f97316" sub="需排程確認" />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, marginBottom:16, flexWrap:"wrap" }}>
        <div style={{ color:"#c4b5fd", fontSize:12 }}>{message || "可上傳稽核計畫表先解析，再確認存入；詳情內可預覽關聯文件。"}</div>
        <button onClick={() => setShowGantt(v => !v)} style={{ background: showGantt ? "rgba(139,92,246,0.2)" : "rgba(255,255,255,0.06)", border:`1px solid ${showGantt?"rgba(139,92,246,0.5)":"rgba(255,255,255,0.12)"}`, borderRadius:10, color: showGantt?"#c4b5fd":"#e2e8f0", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>
          {showGantt ? "◉ 甘特圖" : "◎ 甘特圖"}
        </button>
        {showGantt && (
          <select value={ganttYear} onChange={e => setGanttYear(parseInt(e.target.value))} style={{ ...inputStyle, width:90, padding:"8px 10px" }}>
            {[ganttYear-1, ganttYear, ganttYear+1].map(y => <option key={y} value={y}>{y} 年</option>)}
          </select>
        )}
        <button onClick={() => exportToCsv(filtered, { id:"編號", year:"年度", period:"期別", scheduledDate:"預定日期", dept:"部門", auditor:"稽核員", status:"狀態", findingsCount:"發現數", ncCount:"NC數" }, "稽核計畫.csv")} style={{ background:"rgba(34,197,94,0.1)", border:"1px solid rgba(34,197,94,0.3)", borderRadius:10, color:"#4ade80", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>匯出 CSV</button>
        <button onClick={() => setShowAutoGen(true)} style={{ background:"linear-gradient(135deg,#7c3aed,#8b5cf6)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>自動產生稽核計畫</button>
        <label style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, color:"#e2e8f0", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>
          {busy==="import" ? "讀取中..." : "上傳稽核計畫檔"}
          <input type="file" accept=".docx,.xlsx,.pdf" onChange={e => importPlanFile(e.target.files && e.target.files[0])} style={{ display:"none" }} />
        </label>
      </div>
      {upcoming.length>0 && (
        <div style={{ background: "rgba(249,115,22,0.08)", border: "1px solid rgba(249,115,22,0.2)", borderRadius: 12, padding: 16, marginBottom: 20 }}>
          <div style={{ fontSize: 13, color: "#fb923c", fontWeight: 700, marginBottom: 10 }}>30 天內即將執行</div>
          {upcoming.map(item => (<div key={item.id} style={{ display:"flex", gap:12, alignItems:"center", marginBottom:6 }}><span style={{ color:"#60a5fa", fontFamily:"monospace", fontSize:12 }}>{item.id}</span><span style={{ color:"#e2e8f0", fontSize:13 }}>{item.dept} · {formatDate(item.scheduledDate)}</span><Badge color="#f97316">剩 {daysUntil(item.scheduledDate)} 天</Badge></div>))}
        </div>
      )}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {["all","計畫中","執行中","已完成"].map(key => (<button key={key} onClick={()=>setFilter(key)} style={{ background:filter===key?"rgba(139,92,246,0.2)":"rgba(255,255,255,0.04)", border:`1px solid ${filter===key?"rgba(139,92,246,0.5)":"rgba(255,255,255,0.1)"}`, borderRadius:8, color:filter===key?"#c4b5fd":"#64748b", cursor:"pointer", padding:"6px 14px", fontSize:12, fontWeight:600 }}>{key==="all"?"全部":key}</button>))}
      </div>
      {showGantt ? (
        <AuditGanttView auditPlans={auditPlans} year={ganttYear} onClickPlan={setModal} />
      ) : (
      <div style={{ overflowX: "auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead><tr>{["編號","年度","期別","預定日期","部門","受稽人","稽核員","範圍","狀態","發現數","NC 數",""].map(h => (<th key={h} style={{ textAlign:"left", padding:"10px 12px", color:"#64748b", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.06)", whiteSpace:"nowrap" }}>{h}</th>))}</tr></thead>
          <tbody>
            {filtered.map((item,i) => (
              <tr key={item.id} style={{ background:i%2===0?"rgba(255,255,255,0.02)":"transparent" }}>
                <td style={{ padding:"10px 12px", color:"#8b5cf6", fontWeight:700, fontFamily:"monospace", whiteSpace:"nowrap" }}>{item.id}</td>
                <td style={{ padding:"10px 12px", color:"#94a3b8" }}>{item.year}</td>
                <td style={{ padding:"10px 12px" }}><Badge color={item.period==="上半年"?"#60a5fa":"#f97316"}>{item.period}</Badge></td>
                <td style={{ padding:"10px 12px", color:"#94a3b8", whiteSpace:"nowrap" }}>{formatDate(item.scheduledDate)}</td>
                <td style={{ padding:"10px 12px", color:"#e2e8f0", fontWeight:600 }}>{item.dept}</td>
                <td style={{ padding:"10px 12px", color:"#94a3b8" }}>{item.auditee}</td>
                <td style={{ padding:"10px 12px", color:"#94a3b8" }}>{item.auditor}</td>
                <td style={{ padding:"10px 12px", color:"#64748b", fontSize:11 }}>{item.scope}</td>
                <td style={{ padding:"10px 12px" }}><Badge color={statusColor(item.status)}>{item.status}</Badge></td>
                <td style={{ padding:"10px 12px", textAlign:"center", color:item.findings>0?"#f97316":"#94a3b8", fontWeight:700 }}>{item.findings}</td>
                <td style={{ padding:"10px 12px", textAlign:"center", color:item.ncCount>0?"#ef4444":"#94a3b8", fontWeight:700 }}>{item.ncCount}</td>
                <td style={{ padding:"10px 12px" }}><div style={{ display:"flex", gap:8 }}><button onClick={()=>setModal(item)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:6, color:"#94a3b8", cursor:"pointer", padding:"4px 10px", fontSize:11 }}>詳情</button><button onClick={() => deletePlan(item.id)} style={{ background:"rgba(239,68,68,0.14)", border:"1px solid rgba(239,68,68,0.28)", borderRadius:6, color:"#fca5a5", cursor:"pointer", padding:"4px 10px", fontSize:11 }}>刪除</button></div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      )}
      {modal && (() => {
        const linkedNcCount = (nonConformances||[]).filter(nc => nc.audit_plan_id === modal.id).length;
        return (
        <Modal title={`稽核計畫：${modal.id}`} onClose={() => { setModal(null); setFindingsEdit(null); }}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {/* 基本資料列 */}
            {[["計畫編號",modal.id],["受稽部門",modal.dept],["預定日期",formatDate(modal.scheduledDate)],["實際日期",formatDate(modal.actualDate)],["稽核員",modal.auditor],["受稽人",modal.auditee],["稽核範圍",modal.scope]].map(([k,v]) => (
              <div key={k} style={{ display:"flex", gap:12 }}>
                <div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>{k}</div>
                <div style={{ color:"#e2e8f0", fontWeight:600, fontSize:13 }}>{v}</div>
              </div>
            ))}
            {/* 狀態 — 帶顏色標籤 */}
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>狀態</div>
              <Badge color={statusColor(modal.status)}>{modal.status}</Badge>
            </div>
            {/* 發現數 — 可直接編輯 */}
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#64748b", minWidth:90 }}>發現數</div>
              {findingsEdit === null
                ? (<>
                    <span style={{ color: modal.findings>0?"#f97316":"#e2e8f0", fontWeight:700, fontSize:14 }}>{modal.findings||0}</span>
                    <button onClick={() => setFindingsEdit(String(modal.findings||0))}

            <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:8 }}>
              {modal.status==="計畫中" && (

              {modal.status!=="已完成" && (

              <button onClick={()=>{ setModal(null); setFindingsEdit(null); onCreateNc?.(modal); }} style={{ background:"linear-gradient(135deg,#dc2626,#ef4444)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"12px 24px", fontSize:14, fontWeight:700 }}>開立不符合報告</button>
              <button onClick={()=>printAuditReport(modal)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:10, color:"#e2e8f0", cursor:"pointer", padding:"12px 24px", fontSize:14, fontWeight:700 }}>列印稽核報告</button>
              <button onClick={()=>deletePlan(modal.id)} style={{ background:"rgba(239,68,68,0.14)", border:"1px solid rgba(239,68,68,0.28)", borderRadius:10, color:"#fca5a5", cursor:"pointer", padding:"12px 24px", fontSize:14, fontWeight:700 }}>刪除這筆資料</button>

      {showAutoGen && (

                <input type="number" min="2020" max="2099" value={autoGenDraft.year}
                  onChange={e => setAutoGenDraft(p => ({ ...p, year: parseInt(e.target.value)||_curYear }))}

                <div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>期別</div>
                <select value={autoGenDraft.period}
                  onChange={e => setAutoGenDraft(p => ({ ...p, period: e.target.value }))}
                  style={inputStyle}>

                  <option>下半年</option>

            </div>
            <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
              <div style={{ flex:1, minWidth:140 }}>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>開始日期（第一筆預定日期）</div>
                <input type="date" value={autoGenDraft.startDate}
                  onChange={e => setAutoGenDraft(p => ({ ...p, startDate: e.target.value }))}
                  style={inputStyle} />
              </div>
              <div style={{ flex:1, minWidth:140 }}>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>稽核員</div>
                <input type="text" placeholder="輸入稽核員姓名" value={autoGenDraft.auditor}
                  onChange={e => setAutoGenDraft(p => ({ ...p, auditor: e.target.value }))}

            </div>
            <div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:8 }}>選擇受稽部門（每個部門間隔 7 天排程）</div>
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {DEPT_ISO_MAP.map(d => {
                  const checked = autoGenDraft.selectedDepts.some(x => x.dept === d.dept);
                  return (
                    <label key={d.dept} onClick={() => toggleAutoGenDept(d)}
                      style={{ display:"flex", alignItems:"flex-start", gap:10, cursor:"pointer",
                        background: checked ? "rgba(139,92,246,0.12)" : "rgba(255,255,255,0.03)",
                        border: `1px solid ${checked ? "rgba(139,92,246,0.4)" : "rgba(255,255,255,0.07)"}`,
                        borderRadius:8, padding:"10px 12px" }}>
                      <div style={{ width:16, height:16, marginTop:1, borderRadius:4, flexShrink:0,
                        background: checked ? "linear-gradient(135deg,#7c3aed,#8b5cf6)" : "rgba(255,255,255,0.08)",
                        border: checked ? "none" : "1px solid rgba(255,255,255,0.2)",
                        display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {checked && <span style={{ color:"#fff", fontSize:10, lineHeight:1 }}>✓</span>}
                      </div>
                      <div>
                        <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:13 }}>{d.dept}</div>
                        <div style={{ color:"#64748b", fontSize:11, marginTop:2 }}>{d.scope}</div>
                      </div>
