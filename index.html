// ─── DASHBOARD HOME ──────────────────────────────────────────────────────────
function DashboardHome({ instruments, documents, training, equipment, suppliers, nonConformances, auditPlans, envRecords, setActiveTab }) {
  const now = new Date(); now.setHours(0,0,0,0);
  const [kpiTargets, setKpiTargets] = React.useState(() => loadStoredState("qms_kpi_targets", { ncCloseRate:95, auditCompleteRate:90, overdueInstrMax:0, supplierGoodRate:80 }));
  const [showKpiModal, setShowKpiModal] = React.useState(false);
  React.useEffect(() => saveStoredState("qms_kpi_targets", kpiTargets), [kpiTargets]);
  // 計算每台儀器的下次校正日期（calibratedDate + intervalDays）
  const instrWithDue = instruments.map(i => ({ ...i, _nextCalib: i.status === "免校正" ? null : addDays(i.calibratedDate, i.intervalDays) }));
  const overdueInst = instrWithDue.filter(i => i._nextCalib && daysUntil(i._nextCalib) < 0).length;
  const upcomingInst = instrWithDue.filter(i => { const d=daysUntil(i._nextCalib); return d>=0&&d<=30; }).length;
  const overdueDoc = documents.filter(d => daysUntil(d.nextReview) < 0).length;
  const expiredTrain = training.filter(t => daysUntil(t.validUntil) < 0).length;
  const overdueEquip = equipment.filter(e => daysUntil(e.nextMaintenance) < 0).length;
  const openNc = nonConformances.filter(n => n.status !== "已關閉").length;
  const overdueNc = nonConformances.filter(n => n.status !== "已關閉" && daysUntil(n.dueDate) < 0).length;
  const upcomingAudit = auditPlans.filter(a => a.status === "計畫中" && daysUntil(a.scheduledDate) >= 0 && daysUntil(a.scheduledDate) <= 30).length;
  const envPassRate = envRecords.length > 0 ? Math.round(envRecords.filter(r => r.result === "合格").length / envRecords.length * 100) : 0;
  const poorSupplier = suppliers.filter(s => s.score < 70).length;
  const alerts = [];
  if (overdueInst > 0) alerts.push({ type: "error", msg: `有 ${overdueInst} 个小器校正遇期，請立即安排試驗` });
  if (upcomingInst > 0) alerts.push({ type: "warn", msg: `有 ${upcomingInst} 个小器將於 30 天內到期校正` });
  if (overdueDoc > 0) alerts.push({ type: "error", msg: `有 ${overdueDoc} 份文件顆開複審遇期` });
  if (expiredTrain > 0) alerts.push({ type: "error", msg: `有 ${expiredTrain} 檔員訓練認證已過期` });
  if (overdueEquip > 0) alerts.push({ type: "error", msg: `有 ${overdueEquip} 台設備保養遇期` });
  if (overdueNc > 0) alerts.push({ type: "error", msg: `有 ${overdueNc} 个不符合項目已逾期未關閉` });
  if (upcomingAudit > 0) alerts.push({ type: "warn", msg: `${upcomingAudit} 場內部稽核將於 30 天內執行` });
  if (poorSupplier > 0) alerts.push({ type: "warn", msg: `有 ${poorSupplier} 家供應商評分不足 70 分` });
  if (envPassRate < 90) alerts.push({ type: "warn", msg: `潔淨室環境合格率僅 ${envPassRate}%` });
  // KPI 達標計算
  const ncCloseRate   = nonConformances.length ? Math.round(nonConformances.filter(n=>n.status==="已關閉").length/nonConformances.length*100) : 100;
  const auditCompleteRate = auditPlans.length ? Math.round(auditPlans.filter(a=>a.status==="已完成").length/auditPlans.length*100) : 100;
  const supplierGoodRate  = suppliers.length ? Math.round(suppliers.filter(s=>["優良","合格"].includes(s.evalResult)).length/suppliers.length*100) : 100;
  const kpis = [
    { label: "校正小器", value: instruments.length, sub: overdueInst > 0 ? `${overdueInst}個逾期` : "全部正常", color: overdueInst > 0 ? "#ef4444" : "#60a5fa", tab: "calibration", kpiActual: overdueInst, kpiTarget: kpiTargets.overdueInstrMax, kpiLabel:"逾期台數", kpiPass: overdueInst <= kpiTargets.overdueInstrMax },
    { label: "程序文件", value: documents.length, sub: overdueDoc > 0 ? `${overdueDoc}份逾期` : "全部有效", color: overdueDoc > 0 ? "#ef4444" : "#22c55e", tab: "documents" },
    { label: "訓練記錄", value: training.length, sub: expiredTrain > 0 ? `${expiredTrain}人過期` : "全部有效", color: expiredTrain > 0 ? "#ef4444" : "#22c55e", tab: "training" },
    { label: "設備保養", value: equipment.length, sub: overdueEquip > 0 ? `${overdueEquip}台逾期` : "全部正常", color: overdueEquip > 0 ? "#ef4444" : "#22c55e", tab: "equipment" },
    { label: "供應商", value: suppliers.length, sub: poorSupplier > 0 ? `${poorSupplier}家評分不足` : "全部合格", color: poorSupplier > 0 ? "#eab308" : "#22c55e", tab: "supplier", kpiActual: supplierGoodRate, kpiTarget: kpiTargets.supplierGoodRate, kpiLabel:"優良率%", kpiPass: supplierGoodRate >= kpiTargets.supplierGoodRate },
    { label: "不符合項", value: nonConformances.length, sub: openNc > 0 ? `${openNc}個未關閉` : "全部已關閉", color: openNc > 0 ? "#ef4444" : "#22c55e", tab: "nonconformance", kpiActual: ncCloseRate, kpiTarget: kpiTargets.ncCloseRate, kpiLabel:"關閉率%", kpiPass: ncCloseRate >= kpiTargets.ncCloseRate },
    { label: "稽核計畫", value: auditPlans.length, sub: upcomingAudit > 0 ? `${upcomingAudit}場30天內執行` : "如期進行", color: upcomingAudit > 0 ? "#f97316" : "#8b5cf6", tab: "auditplan", kpiActual: auditCompleteRate, kpiTarget: kpiTargets.auditCompleteRate, kpiLabel:"完成率%", kpiPass: auditCompleteRate >= kpiTargets.auditCompleteRate },
    { label: "環境監測", value: envRecords.length, sub: `合格率 ${envPassRate}%`, color: envPassRate >= 90 ? "#14b8a6" : envPassRate >= 80 ? "#eab308" : "#ef4444", tab: "environment" },
  ];
  return (
    <div>
      <div style={{ marginBottom: 28, display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "#e2e8f0", letterSpacing: 1 }}>潔沛企業有限公司 ISO 9001:2015</div>
          <div style={{ fontSize: 14, color: "#64748b", marginTop: 4 }}>品質管理系統自動稽核主控台 — {new Date().toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric" })}</div>
        </div>
        <button onClick={() => setShowKpiModal(true)} style={{ background:"rgba(99,102,241,0.15)", border:"1px solid rgba(99,102,241,0.4)", borderRadius:8, padding:"7px 14px", color:"#a5b4fc", fontSize:13, cursor:"pointer", fontWeight:600, whiteSpace:"nowrap" }}>⚙ 設定目標</button>
      </div>
      {showKpiModal && <KpiTargetModal targets={kpiTargets} onSave={(t) => { setKpiTargets(t); setShowKpiModal(false); }} onClose={() => setShowKpiModal(false)} />}
      {alerts.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 700, marginBottom: 10 }}>⚠ 系統警示 ({alerts.length})</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {alerts.map((a, i) => (
              <div key={i} style={{ background: a.type==="error"?"rgba(239,68,68,0.08)":"rgba(234,179,8,0.08)", border: `1px solid ${a.type==="error"?"rgba(239,68,68,0.3)":"rgba(234,179,8,0.3)"}`, borderRadius: 10, padding: "10px 16px", fontSize: 13, color: a.type==="error"?"#fca5a5":"#fde68a", display:"flex", alignItems:"center", gap:8 }}>
                <span>{a.type==="error"?"❌":"⚠️"}</span><span>{a.msg}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 14, marginBottom: 28 }}>
        {kpis.map(k => (
          <div key={k.tab} onClick={() => setActiveTab(k.tab)} style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${k.color}40`, borderRadius: 14, padding: "18px 20px", cursor: "pointer", transition: "all 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.background="rgba(255,255,255,0.08)"}
            onMouseLeave={e => e.currentTarget.style.background="rgba(255,255,255,0.04)"} >
            <div style={{ fontSize: 28, fontWeight: 800, color: k.color, lineHeight: 1 }}>{k.value}</div>
            <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 6 }}>{k.label}</div>
            <div style={{ fontSize: 11, color: k.color, marginTop: 4, fontWeight: 600 }}>{k.sub}</div>
            {k.kpiPass !== undefined && (
              <div style={{ marginTop: 6 }}>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 20, background: k.kpiPass ? "rgba(34,197,94,0.15)" : "rgba(239,68,68,0.15)", color: k.kpiPass ? "#22c55e" : "#ef4444", border: `1px solid ${k.kpiPass?"rgba(34,197,94,0.4)":"rgba(239,68,68,0.4)"}` }}>
                  {k.kpiPass ? "目標達成 ✓" : `未達標（目標 ${k.kpiTarget}${k.kpiLabel?.includes("%")?"%":""}）`}
                </span>
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 14 }}>最近校正到期小器</div>
          {[...instrWithDue].filter(i=>i._nextCalib).sort((a,b) => daysUntil(a._nextCalib)-daysUntil(b._nextCalib)).slice(0,5).map(inst => (
            <div key={inst.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <div>
                <div style={{ fontSize:13, color:"#e2e8f0" }}>{inst.name}</div>
                <div style={{ fontSize:11, color:"#64748b" }}>{inst.id} · 到期 {inst._nextCalib||"-"}</div>
              </div>
              <Badge color={urgencyColor(daysUntil(inst._nextCalib))}>{urgencyLabel(daysUntil(inst._nextCalib))}</Badge>
            </div>
          ))}
        </div>
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 14 }}>未關閉不符合項目</div>
          {nonConformances.filter(n => n.status !== "已關閉").slice(0,5).map(nc => (
            <div key={nc.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <div>
                <div style={{ fontSize:12, color:"#e2e8f0" }}>{nc.description.slice(0,20)}{nc.description.length>20?"...":""}</div>
                <div style={{ fontSize:11, color:"#64748b" }}>{nc.id} — {nc.dept}</div>
              </div>
              <Badge color={daysUntil(nc.dueDate)===9999?"#64748b":daysUntil(nc.dueDate)<0?"#ef4444":daysUntil(nc.dueDate)<=7?"#eab308":"#60a5fa"}>{daysUntil(nc.dueDate)===9999?"無到期日":daysUntil(nc.dueDate)<0?"逾期":"剩"+daysUntil(nc.dueDate)+"天"}</Badge>
            </div>
          ))}
          {nonConformances.filter(n=>n.status!=="已關閉").length===0 && <div style={{color:"#22c55e",fontSize:13,marginTop:8}}>✓ 目前沒有未關閉不符合項</div>}
        </div>
      </div>
      {/* ── KPI 趨勢分析 ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16, marginTop:20 }}>
        {/* NC 月趨勢（最近6個月）*/}
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20, gridColumn:"span 2" }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>不符合 月趨勢（最近 6 個月）</div>
          {(() => {
            const months = Array.from({length:6}, (_,i) => { const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-5+i); return d.toISOString().slice(0,7); });
            const counts = months.map(m => ({ m, cnt: nonConformances.filter(nc=>(nc.date||"").startsWith(m)).length }));
            const max = Math.max(...counts.map(c=>c.cnt), 1);
            return counts.map(({m,cnt}) => (
              <div key={m} style={{ marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#94a3b8", marginBottom:3 }}>
                  <span>{m}</span><span style={{ fontWeight:700, color:cnt>0?"#f87171":"#22c55e" }}>{cnt} 件</span>
                </div>
                <div style={{ height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>
                  <div style={{ width:`${(cnt/max)*100}%`, height:"100%", background:cnt>0?"#ef4444":"#22c55e", borderRadius:4 }} />
                </div>
              </div>
            ));
          })()}
        </div>
        {/* 稽核完成率 */}
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20 }}>
          <div style={{ fontSize:14, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>稽核計畫完成率</div>
          {(() => {
            const total = auditPlans.length;
            const done = auditPlans.filter(a=>a.status==="已完成").length;
            const pct = total ? Math.round(done/total*100) : 0;
            const color = pct>=80?"#22c55e":pct>=50?"#f59e0b":"#ef4444";
            return (
              <div>
                <div style={{ fontSize:36, fontWeight:800, color, lineHeight:1, marginBottom:8 }}>{pct}%</div>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:12 }}>{done} / {total} 場已完成</div>
                <div style={{ height:10, background:"rgba(255,255,255,0.06)", borderRadius:5, overflow:"hidden" }}>
                  <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:5 }} />
                </div>
                <div style={{ display:"flex", gap:12, marginTop:12, fontSize:11 }}>
                  {[["計畫中","#f97316"],["執行中","#60a5fa"],["已完成","#22c55e"]].map(([s,c])=>(
                    <div key={s} style={{ display:"flex", alignItems:"center", gap:4 }}>
                      <div style={{ width:8, height:8, borderRadius:2, background:c }} />
                      <span style={{ color:"#94a3b8" }}>{s} {auditPlans.filter(a=>a.status===s).length}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [erpUser, setErpUser] = useState(() => getErpUser());
  const [activeTab, setActiveTab] = useState(() => {
    if (typeof window === "undefined") return "home";
    const params = new URLSearchParams(window.location.search);
    return params.get("google") ? "notification" : (params.get("tab") || "home");
  });

  const [instruments, setInstruments] = useState(initialInstruments);
  const [documents, setDocuments] = useState(initialDocuments);
  const [training, setTraining] = useState(initialTraining);
  const [equipment, setEquipment] = useState(initialEquipment);
  const [suppliers, setSuppliers] = useState(initialSuppliers);
  const [nonConformances, setNonConformances] = useState(initialNonConformances);
  const [highlightNcId, setHighlightNcId] = useState(null);
  const [auditPlans, setAuditPlans] = useState(initialAuditPlans);
  const [envRecords, setEnvRecords] = useState(initialEnvRecords);
  const [prodRecords, setProdRecords] = useState(() => loadStoredState("audit_prodrecords", initialProdRecords));
  const [qualityRecords, setQualityRecords] = useState(() => loadStoredState("audit_qualityrecords", initialQualityRecords));
  const [manuals] = useState(initialManuals);
  const [ncPrefill, setNcPrefill] = useState(null);
  const [theme, setTheme] = useState(() => localStorage.getItem("qms_theme") || "dark");
  const [showSearch, setShowSearch] = useState(false);

  useEffect(() => saveStoredState("audit_prodrecords", prodRecords), [prodRecords]);
  useEffect(() => saveStoredState("audit_qualityrecords", qualityRecords), [qualityRecords]);

  // 深色 / 淺色模式切換：同步 CSS class 到 body
  useEffect(() => {
    localStorage.setItem("qms_theme", theme);
    if (theme === "light") {
      document.body.classList.add("light-mode");
    } else {
      document.body.classList.remove("light-mode");
    }
  }, [theme]);

  // Ctrl+K 開啟全域搜尋，Escape 關閉
  useEffect(() => {
    function onKey(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); setShowSearch(true); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  useEffect(() => {
    let cancelled = false;
    async function loadOpsData() {
      try {
        const [ncPayload, auditPayload, envPayload] = await Promise.all([
          apiJson("/api/nonconformances"),
          apiJson("/api/audit-plans"),
          apiJson("/api/environment-records"),
        ]);
        if (cancelled) return;
        setNonConformances(ncPayload.items || []);
        setAuditPlans(auditPayload.items || []);
        setEnvRecords(envPayload.items || []);
      } catch (err) {
        console.warn("Failed to load operation data", err);
      }
    }
    loadOpsData();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    function onExpired() { setErpUser(null); }
    window.addEventListener("erp-session-expired", onExpired);
    return () => window.removeEventListener("erp-session-expired", onExpired);
  }, []);

  async function handleLogin(data) {
    setErpUser({ id: data.user_id, emp_no: data.emp_no, name: data.name, role_id: data.role_id });
  }

  async function handleLogout() {
    await erpLogout();
    setErpUser(null);
  }

  function onCreateNcFromPlan(plan) {
    setNcPrefill({
      dept: plan.dept || "",
      audit_plan_id: plan.id || "",
      date: new Date().toISOString().split("T")[0],
      type: "製程異常",
      description: "",
      responsible: plan.auditee || "",
    });
    setActiveTab("nonconformance");
  }

  if (!erpUser) {
    return <LoginPage onLogin={handleLogin} />;
  }

  const tabs = [
    { id: "home",           label: "主控台",   icon: "⌂" },
    { id: "calibration",    label: "校正管理", icon: "◎" },
    { id: "documents",      label: "文件管理", icon: "≡" },
    { id: "library",        label: "文件庫",   icon: "📂" },
    { id: "training",       label: "訓練管理", icon: "□" },
    { id: "equipment",      label: "設備保養", icon: "⚙" },
    { id: "supplier",       label: "供應商管理", icon: "◈" },
    { id: "nonconformance", label: "不符合管理", icon: "⚠" },
    { id: "auditplan",      label: "稽核計畫", icon: "✓" },
    { id: "environment",    label: "環境監測", icon: "◉" },
    { id: "production",     label: "記錄匯出", icon: "R" },
    { id: "notification",   label: "通知提醒", icon: "✉" },
    { id: "aiworkbench",    label: "AI 工作台", icon: "AI" },
    { id: "report",         label: "稽核報告", icon: "☰" },
    { id: "erpmaster",      label: "ERP 主資料", icon: "⊞" },
  ];

  function renderTab() {
    switch(activeTab) {
      case "home":           return <DashboardHome instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} setActiveTab={setActiveTab} />;
      case "calibration":    return <CalibrationTab instruments={instruments} setInstruments={setInstruments} />;
      case "documents":      return <DocumentsManagerTab documents={documents} setDocuments={setDocuments} manuals={manuals} />;
      case "library":        return <LibraryHierarchyTab documents={documents} manuals={manuals} />;
      case "training":       return <TrainingTab training={training} setTraining={setTraining} />;
      case "equipment":      return <EquipmentTab equipment={equipment} setEquipment={setEquipment} />;
      case "supplier":       return <SupplierTab suppliers={suppliers} setSuppliers={setSuppliers} nonConformances={nonConformances} />;
      case "nonconformance": return <NonConformanceTab nonConformances={nonConformances} setNonConformances={setNonConformances} highlightNcId={highlightNcId} onHighlightDone={() => setHighlightNcId(null)} ncPrefill={ncPrefill} setNcPrefill={setNcPrefill} />;
      case "auditplan":      return <AuditPlanTab auditPlans={auditPlans} setAuditPlans={setAuditPlans} nonConformances={nonConformances} onCreateNc={onCreateNcFromPlan} />;
      case "environment":    return <EnvironmentTab envRecords={envRecords} setEnvRecords={setEnvRecords} />;
    case "production":     return <PageErrorBoundary pageName="????" storageKeys={["audit_prodrecords", "audit_qualityrecords"]}><ProductionTab envRecords={envRecords} prodRecords={prodRecords} setProdRecords={setProdRecords} qualityRecords={qualityRecords} setQualityRecords={setQualityRecords} nonConformances={nonConformances} auditPlans={auditPlans} setActiveTab={setActiveTab} setHighlightNcId={setHighlightNcId} /></PageErrorBoundary>;
      case "notification":   return <NotificationTab instruments={instruments} documents={documents} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} />;
      case "aiworkbench":    return <AIWorkbenchTab documents={documents} manuals={manuals} nonConformances={nonConformances} />;
      case "report":         return <ReportTab instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} />;
      case "erpmaster":      return <ErpMasterTab setActiveTab={setActiveTab} setNcPrefill={setNcPrefill} />;
      default:               return <DashboardHome instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} setActiveTab={setActiveTab} />;
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: "radial-gradient(circle at top left, rgba(14,165,233,0.08), transparent 26%), linear-gradient(135deg, #08101f 0%, #0b1220 45%, #080d18 100%)", color: "#e2e8f0", fontFamily: "'Noto Sans TC', sans-serif" }}>
      {showSearch && (
        <GlobalSearchOverlay
          onClose={() => setShowSearch(false)}
          onNavigate={(tab) => { setActiveTab(tab); setShowSearch(false); }}
          instruments={instruments} documents={documents} training={training}
          equipment={equipment} suppliers={suppliers} nonConformances={nonConformances}
          auditPlans={auditPlans}
        />
      )}
      <div style={{ position: "sticky", top: 0, zIndex: 20, background: "rgba(8,15,30,0.88)", borderBottom: "1px solid rgba(148,163,184,0.12)", backdropFilter: "blur(16px)", padding: "0 24px", boxShadow: "0 10px 30px rgba(2,6,23,0.18)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 18, overflowX: "auto" }}>
          <div style={{ padding: "14px 0", minWidth: 170 }}>
            <div style={{ fontSize: 11, letterSpacing: 1.4, textTransform: "uppercase", color: "#7dd3fc", fontWeight: 800 }}>Jepei QMS</div>
            <div style={{ fontSize: 15, color: "#e2e8f0", fontWeight: 800, marginTop: 4 }}>品質稽核工作台</div>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10, flexShrink: 0, paddingRight: 4 }}>
            <div style={{ fontSize: 12, color: "#94a3b8" }}>
              <span style={{ color: "#7dd3fc", fontWeight: 700 }}>{erpUser.name}</span>
              <span style={{ marginLeft: 6, color: "#475569" }}>{erpUser.emp_no}</span>
            </div>
            <button onClick={() => setShowSearch(true)}
              title="全系統搜尋（Ctrl+K）"
              style={{ padding: "6px 12px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(148,163,184,0.2)", borderRadius: 8, color: "#94a3b8", fontSize: 15, cursor: "pointer", transition: "all 0.2s", lineHeight: 1 }}>
              ⌕
            </button>
            <button onClick={() => setTheme(t => t === "dark" ? "light" : "dark")}
              title={theme === "dark" ? "切換至淺色模式" : "切換至深色模式"}
              style={{ padding: "6px 12px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(148,163,184,0.2)", borderRadius: 8, color: "#94a3b8", fontSize: 14, cursor: "pointer", transition: "all 0.2s", lineHeight: 1 }}>
              {theme === "dark" ? "☀" : "🌙"}
            </button>
            <button onClick={handleLogout} style={{ padding: "6px 14px", background: "transparent", border: "1px solid rgba(148,163,184,0.2)", borderRadius: 8, color: "#64748b", fontSize: 12, cursor: "pointer", transition: "all 0.2s" }}
              onMouseEnter={e => { e.target.style.borderColor = "rgba(239,68,68,0.4)"; e.target.style.color = "#fca5a5"; }}
              onMouseLeave={e => { e.target.style.borderColor = "rgba(148,163,184,0.2)"; e.target.style.color = "#64748b"; }}>
              登出
            </button>
          </div>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
              background: activeTab === t.id ? "rgba(56,189,248,0.14)" : "transparent",
              border: activeTab === t.id ? "1px solid rgba(56,189,248,0.28)" : "1px solid transparent",
              cursor: "pointer",
              padding: "10px 14px",
              fontSize: 12,
              fontWeight: 700,
              color: activeTab === t.id ? "#dbeafe" : "#94a3b8",
              borderRadius: 12,
              whiteSpace: "nowrap",
              display: "flex",
              alignItems: "center",
              gap: 8,
              transition: "all 0.2s ease",
              margin: "10px 0",
            }}>
              <span style={{ fontSize: 12, minWidth: 24, height: 24, display: "inline-flex", alignItems: "center", justifyContent: "center", borderRadius: 999, background: activeTab === t.id ? "rgba(59,130,246,0.18)" : "rgba(255,255,255,0.06)" }}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{ maxWidth: 1460, margin: "0 auto", padding: "28px 24px 40px" }}>
        {renderTab()}
      </div>
    </div>
  );
}
