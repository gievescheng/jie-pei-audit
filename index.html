function SpcImrChart({ result, label, color = "#38bdf8", spec = {} }) {
  if (!result || !result.x_values || result.x_values.length === 0)
    return <div style={{ color:"#475569", fontSize:12, textAlign:"center", padding:16 }}>尚無資料</div>;

  const xVals = result.x_values;
  const mrVals = result.mr_values || [];
  const xBar = result.x_bar, xUcl = result.x_ucl, xLcl = result.x_lcl;
  const mrBar = result.mr_bar, mrUcl = result.mr_ucl;
  const oocX = new Set(result.ooc_x || []);
  const oocMr = new Set(result.ooc_mr || []);

  const W = 520, H = 130, padL = 40, padR = 12, padT = 14, padB = 20;
  const innerW = W - padL - padR, innerH = H - padT - padB;

  function makeScaler(vals, extras = []) {
    const all = [...vals, ...extras].filter(v => v !== null && v !== undefined);
    const mn = Math.min(...all), mx = Math.max(...all);
    const pad = (mx - mn) * 0.15 || 0.5;
    return { min: mn - pad, max: mx + pad };
  }

  function toY(v, domain) {
    return padT + innerH - ((v - domain.min) / (domain.max - domain.min)) * innerH;
  }

  function polyline(vals, domain) {
    return vals.map((v, i) => {
      const x = padL + (i / Math.max(vals.length - 1, 1)) * innerW;
      return `${x.toFixed(1)},${toY(v, domain).toFixed(1)}`;
    }).join(" ");
  }

  const xDomain = makeScaler(xVals, [xUcl, xLcl, spec.usl, spec.lsl].filter(Boolean));
  const mrDomain = makeScaler(mrVals, [mrUcl]);

  function hLine(y, stroke, dash = "") {
    return <line x1={padL} y1={y} x2={padL + innerW} y2={y} stroke={stroke} strokeWidth={1} strokeDasharray={dash} />;
  }

  const uslY = spec.usl != null ? toY(spec.usl, xDomain) : null;
  const lslY = spec.lsl != null ? toY(spec.lsl, xDomain) : null;

  return (
    <div>
      <div style={{ fontSize:12, color:"#94a3b8", marginBottom:4, fontWeight:600 }}>{label} — X 管制圖</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display:"block", overflow:"visible" }}>
        {/* gridlines */}
        {hLine(toY(xUcl, xDomain), "rgba(239,68,68,0.5)", "4 2")}
        {hLine(toY(xBar, xDomain), "rgba(255,255,255,0.25)")}
        {hLine(toY(xLcl, xDomain), "rgba(239,68,68,0.5)", "4 2")}
        {uslY && hLine(uslY, "rgba(251,191,36,0.6)", "2 3")}
        {lslY && hLine(lslY, "rgba(251,191,36,0.6)", "2 3")}
        {/* area */}
        <polyline points={polyline(xVals, xDomain)} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round" />
        {/* points */}
        {xVals.map((v, i) => {
          const cx = padL + (i / Math.max(xVals.length - 1, 1)) * innerW;
          const cy = toY(v, xDomain);
          const isOoc = oocX.has(i);
          return <circle key={i} cx={cx} cy={cy} r={isOoc ? 4 : 2.5} fill={isOoc ? "#ef4444" : color} />;
        })}
        {/* Y labels */}
        <text x={padL - 4} y={toY(xUcl, xDomain) + 4} textAnchor="end" fill="#ef4444" fontSize={8}>UCL</text>
        <text x={padL - 4} y={toY(xBar, xDomain) + 4} textAnchor="end" fill="#94a3b8" fontSize={8}>X̄</text>
        <text x={padL - 4} y={toY(xLcl, xDomain) + 4} textAnchor="end" fill="#ef4444" fontSize={8}>LCL</text>
        {/* X axis ticks */}
        {xVals.map((_, i) => i % Math.ceil(xVals.length / 8) === 0 ? (
          <text key={i} x={padL + (i / Math.max(xVals.length - 1, 1)) * innerW} y={H - 4} textAnchor="middle" fill="#475569" fontSize={7}>{i + 1}</text>
        ) : null)}
      </svg>
      {mrVals.length > 0 && (
        <>
          <div style={{ fontSize:12, color:"#94a3b8", marginBottom:4, marginTop:10, fontWeight:600 }}>{label} — MR 管制圖</div>
          <svg width="100%" viewBox={`0 0 ${W} ${Math.round(H * 0.65)}`} style={{ display:"block", overflow:"visible" }}>
            {hLine(toY(mrUcl, mrDomain), "rgba(239,68,68,0.5)", "4 2")}
            {hLine(toY(mrBar, mrDomain), "rgba(255,255,255,0.2)")}
            <polyline points={polyline(mrVals, mrDomain)} fill="none" stroke="#a78bfa" strokeWidth={1.5} />
            {mrVals.map((v, i) => {
              const cx = padL + (i / Math.max(mrVals.length - 1, 1)) * innerW;
              const cy = toY(v, mrDomain);
              return <circle key={i} cx={cx} cy={cy} r={oocMr.has(i) ? 4 : 2} fill={oocMr.has(i) ? "#ef4444" : "#a78bfa"} />;
            })}
            <text x={padL - 4} y={toY(mrUcl, mrDomain) + 4} textAnchor="end" fill="#ef4444" fontSize={8}>UCL</text>
          </svg>
        </>
      )}
    </div>
  );
}

function CpkGauge({ cpk, label }) {
  if (cpk == null) return null;
  const grade = cpk >= 1.67 ? { text:"A+", color:"#22c55e" }
    : cpk >= 1.33 ? { text:"A",  color:"#4ade80" }
    : cpk >= 1.00 ? { text:"B",  color:"#f59e0b" }
    : cpk >= 0.67 ? { text:"C",  color:"#f97316" }
    : { text:"D", color:"#ef4444" };
  const pct = Math.min(cpk / 2.0, 1.0);
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:11, color:"#64748b", marginBottom:4 }}>{label}</div>
      <div style={{ width:72, height:72, borderRadius:"50%", border:`3px solid ${grade.color}`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", margin:"0 auto" }}>
        <div style={{ fontSize:18, fontWeight:800, color:grade.color, lineHeight:1 }}>{cpk.toFixed(2)}</div>
        <div style={{ fontSize:11, fontWeight:700, color:grade.color }}>{grade.text}</div>
      </div>
      <div style={{ width:72, height:5, background:"rgba(255,255,255,0.07)", borderRadius:3, margin:"6px auto 0", overflow:"hidden" }}>
        <div style={{ width:(pct * 100) + "%", height:"100%", background:grade.color, borderRadius:3 }} />
      </div>
    </div>
  );
}

const NELSON_LABELS = {
  rule_1_beyond_3sigma:     "Rule 1：超出 ±3σ",
  rule_2_nine_same_side:    "Rule 2：連續 9 點同側",
  rule_3_six_monotone:      "Rule 3：連續 6 點單調",
  rule_4_fourteen_alternating: "Rule 4：連續 14 點交替",
  rule_5_two_of_three_2sigma:  "Rule 5：3 點中 2 點超 ±2σ",
  rule_6_four_of_five_1sigma:  "Rule 6：5 點中 4 點超 ±1σ",
};

function SpcTab({ prodRecords }) {
  const [csvFile, setCsvFile] = useState(null);
  const [batchId, setBatchId] = useState("");
  const [specForm, setSpecForm] = useState({ thickness_usl:"705", thickness_lsl:"695", ttv_usl:"2.0", ttv_lsl:"0.0" });
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState([]);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [activeResult, setActiveResult] = useState(null);
  const fileRef = useRef(null);

  useEffect(() => {
    fetch("/api/spc/history").then(r => r.json()).then(d => setHistory(d.items || [])).catch(() => {});
  }, []);

  async function handleAnalyze() {
    if (!csvFile && !batchId) { setMsg("請選擇 CSV 檔案"); return; }
    if (!csvFile) { setMsg("請選擇 CSV 檔案（僅填批號無法進行分析）"); return; }
    setBusy(true); setMsg(""); setResult(null);
    try {
      const fd = new FormData();
      fd.append("csv_file", csvFile);
      fd.append("batch_id", batchId || csvFile.name.replace(/\.csv$/i, ""));
      fd.append("spec", JSON.stringify({
        thickness_usl: parseFloat(specForm.thickness_usl),
        thickness_lsl: parseFloat(specForm.thickness_lsl),
        ttv_usl: parseFloat(specForm.ttv_usl),
        ttv_lsl: parseFloat(specForm.ttv_lsl),
      }));
      const resp = await fetch("/api/spc/analyze", { method:"POST", body: fd });
      const res = await resp.json();
      if (!res.success) throw new Error(res.error || "分析失敗");
      setResult(res);
      setActiveResult(res.result);
      // 重新載入歷史
      const hResp = await fetch("/api/spc/history");
      const hData = await hResp.json();
      setHistory(hData.items || []);
      setMsg("✓ 分析完成");
    } catch (e) {
      setMsg("❌ " + e.message);
    } finally {
      setBusy(false);
    }
  }

  const displayResult = activeResult || (result && result.result);
  const thk = displayResult && displayResult.thickness;
  const ttv = displayResult && displayResult.ttv;
  const summary = displayResult && displayResult.summary;

  const allNelson = [];
  [["Thickness", thk], ["TTV", ttv]].forEach(([name, r]) => {
    if (!r) return;
    Object.entries(r.nelson_signals || {}).forEach(([k, pts]) => {
      if (pts && pts.length) allNelson.push({ name, rule: NELSON_LABELS[k] || k, count: pts.length });
    });
  });

  const panel = (children, style={}) => (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20, ...style }}>
      {children}
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:800, color:"#e2e8f0" }}>SPC 統計製程管制</div>
        <div style={{ fontSize:13, color:"#64748b", marginTop:4 }}>晶圓清洗製程 — Thickness / TTV / Particle 管制圖</div>
      </div>

      {/* ── 上傳區 ── */}
      {panel(<>
        <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:16 }}>上傳 CSV 量測資料</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, marginBottom:16 }}>
          {[
            { key:"thickness_usl", label:"Thickness USL (μm)" },
            { key:"thickness_lsl", label:"Thickness LSL (μm)" },
            { key:"ttv_usl",       label:"TTV USL (μm)" },
            { key:"ttv_lsl",       label:"TTV LSL (μm)" },
          ].map(f => (
            <div key={f.key}>
              <div style={{ fontSize:11, color:"#64748b", marginBottom:4 }}>{f.label}</div>
              <input type="number" step="0.1" value={specForm[f.key]}
                onChange={e => setSpecForm(p => ({...p, [f.key]: e.target.value}))}
                style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"6px 10px", color:"#e2e8f0", fontSize:13 }} />
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
          <input type="text" placeholder="批次 ID（選填，預設用檔名）" value={batchId}
            onChange={e => setBatchId(e.target.value)}
            style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"7px 12px", color:"#e2e8f0", fontSize:13, width:220 }} />
          <button onClick={() => fileRef.current && fileRef.current.click()}
            style={{ background:"rgba(56,189,248,0.12)", border:"1px solid rgba(56,189,248,0.3)", borderRadius:8, padding:"7px 16px", color:"#7dd3fc", fontSize:13, cursor:"pointer", fontWeight:600 }}>
            {csvFile ? `📄 ${csvFile.name}` : "選擇 CSV 檔"}
          </button>
          <input ref={fileRef} type="file" accept=".csv" style={{ display:"none" }}
            onChange={e => { setCsvFile(e.target.files[0] || null); setBatchId(prev => prev || (e.target.files[0] ? e.target.files[0].name.replace(/\.csv$/i,"") : "")); }} />
          <button onClick={handleAnalyze} disabled={busy || !csvFile}
            style={{ background: busy || !csvFile ? "rgba(255,255,255,0.04)" : "linear-gradient(90deg,#3b82f6,#6366f1)", border:"none", borderRadius:8, padding:"7px 20px", color: busy || !csvFile ? "#475569" : "#fff", fontSize:13, cursor: busy || !csvFile ? "default" : "pointer", fontWeight:700 }}>
            {busy ? "分析中…" : "開始分析"}
          </button>
          {msg && <span style={{ fontSize:13, color: msg.startsWith("✓") ? "#22c55e" : "#ef4444" }}>{msg}</span>}
        </div>
        {result && result.parse_errors && result.parse_errors.length > 0 && (
          <div style={{ marginTop:12, padding:"8px 12px", background:"rgba(234,179,8,0.08)", border:"1px solid rgba(234,179,8,0.3)", borderRadius:8 }}>
            {result.parse_errors.map((e, i) => <div key={i} style={{ fontSize:12, color:"#fde68a" }}>{e}</div>)}
          </div>
        )}
      </>, { marginBottom:16 })}

      {/* ── 分析結果 ── */}
      {displayResult && (
        <>
          {/* Summary 警示 */}
          {summary && summary.needs_attention && (
            <div style={{ marginBottom:14, padding:"10px 16px", background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:10, display:"flex", gap:10, alignItems:"center" }}>
              <span style={{ fontSize:16 }}>⚠</span>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:"#fca5a5" }}>製程異常警示</div>
                <div style={{ fontSize:12, color:"#fca5a5", marginTop:2 }}>
                  {summary.any_ooc && "偵測到超出管制界限（OOC）的點；"}
                  {summary.any_nelson && "Nelson Rules 訊號觸發，請確認製程狀態。"}
                </div>
              </div>
            </div>
          )}

          {/* Nelson Rules */}
          {allNelson.length > 0 && panel(<>
            <div style={{ fontSize:13, fontWeight:700, color:"#fbbf24", marginBottom:10 }}>⚡ Nelson Rules 失控訊號</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {allNelson.map((n, i) => (
                <div key={i} style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, padding:"5px 12px", fontSize:12, color:"#fca5a5" }}>
                  <span style={{ fontWeight:700 }}>[{n.name}]</span> {n.rule}（{n.count} 處）
                </div>
              ))}
            </div>
          </>, { marginBottom:14 })}

          {/* Cpk 儀錶 + 統計摘要 */}
          {panel(<>
            <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>製程能力指數</div>
            <div style={{ display:"flex", gap:32, flexWrap:"wrap", alignItems:"flex-start" }}>
              <CpkGauge cpk={summary && summary.thickness_cpk} label="Thickness Cpk" />
              <CpkGauge cpk={summary && summary.ttv_cpk} label="TTV Cpk" />
              <div style={{ flex:1, minWidth:200 }}>
                {thk && thk.capability && (
                  <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.9 }}>
                    <div>Thickness：X̄ = <span style={{ color:"#e2e8f0" }}>{thk.x_bar.toFixed(3)} μm</span> / σ = <span style={{ color:"#e2e8f0" }}>{thk.sigma_mr.toFixed(4)}</span></div>
                    {thk.capability.cp   != null && <div>Cp = <span style={{ color:"#60a5fa" }}>{thk.capability.cp}</span></div>}
                    {thk.capability.cpk  != null && <div>Cpk = <span style={{ color:"#60a5fa" }}>{thk.capability.cpk}</span> <span style={{ color:"#475569" }}>({thk.capability.grade})</span></div>}
                  </div>
                )}
                {ttv && ttv.capability && (
                  <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.9, marginTop:8 }}>
                    <div>TTV：X̄ = <span style={{ color:"#e2e8f0" }}>{ttv.x_bar.toFixed(4)} μm</span> / σ = <span style={{ color:"#e2e8f0" }}>{ttv.sigma_mr.toFixed(5)}</span></div>
                    {ttv.capability.cpk != null && <div>Cpk = <span style={{ color:"#60a5fa" }}>{ttv.capability.cpk}</span> <span style={{ color:"#475569" }}>({ttv.capability.grade})</span></div>}
                  </div>
                )}
              </div>
            </div>
          </>, { marginBottom:14 })}

          {/* I-MR 圖 */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:14 }}>
            {thk && panel(<>
              <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:12 }}>Thickness I-MR 管制圖</div>
              <SpcImrChart result={thk} label="Thickness" color="#38bdf8"
                spec={{ usl: parseFloat(specForm.thickness_usl), lsl: parseFloat(specForm.thickness_lsl) }} />
              {thk.ooc_x && thk.ooc_x.length > 0 && (
                <div style={{ marginTop:8, fontSize:11, color:"#fca5a5" }}>
                  OOC 點：第 {thk.ooc_x.map(i => i + 1).join("、")} 筆
                </div>
              )}
            </>)}
            {ttv && panel(<>
              <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:12 }}>TTV I-MR 管制圖</div>
              <SpcImrChart result={ttv} label="TTV" color="#a78bfa"
                spec={{ usl: parseFloat(specForm.ttv_usl), lsl: parseFloat(specForm.ttv_lsl) }} />
              {ttv.ooc_x && ttv.ooc_x.length > 0 && (
                <div style={{ marginTop:8, fontSize:11, color:"#fca5a5" }}>
                  OOC 點：第 {ttv.ooc_x.map(i => i + 1).join("、")} 筆
                </div>
              )}
            </>)}
          </div>
        </>
      )}

      {/* ── 跨批次 Cpk 趨勢圖 ── */}
      {history.length >= 2 && panel(<>
        <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>跨批次 Cpk 趨勢（近 {Math.min(history.length,20)} 批）</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          {[
            { key:"thickness_cpk", label:"Thickness Cpk", color:"#38bdf8" },
            { key:"ttv_cpk",       label:"TTV Cpk",       color:"#a78bfa" },
          ].map(({ key, label, color }) => {
            const pts = [...history].reverse().slice(0, 20)
              .filter(h => h[key] != null)
              .map((h, i) => ({ label: String(i + 1), value: h[key] }));
            return (
              <div key={key}>
                <div style={{ fontSize:11, color:"#64748b", marginBottom:6, fontWeight:600 }}>{label}</div>
                {pts.length >= 2
                  ? <SvgLineChart data={pts} color={color} domainMin={0} domainMax={Math.max(2, ...pts.map(p => p.value)) * 1.1} />
                  : <div style={{ fontSize:11, color:"#475569" }}>需 2 筆以上</div>
                }
                {/* 目標線說明 */}
                <div style={{ display:"flex", gap:12, marginTop:4 }}>
                  {[{v:1.33,c:"#22c55e",t:"A（≥1.33）"},{v:1.00,c:"#f59e0b",t:"B（≥1.00）"}].map(g => (
                    <div key={g.v} style={{ display:"flex", alignItems:"center", gap:4 }}>
                      <div style={{ width:12, height:2, background:g.c, borderRadius:1 }} />
                      <span style={{ fontSize:9, color:"#475569" }}>{g.t}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </>, { marginBottom:16 })}

      {/* ── 歷史記錄 ── */}
      {panel(<>
        <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>近期分析記錄</div>
        {history.length === 0 && <div style={{ color:"#475569", fontSize:12 }}>尚無分析記錄</div>}
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {history.slice(0, 10).map((h, i) => {
            const tCpk = h.thickness_cpk, vCpk = h.ttv_cpk;
            const tColor = tCpk == null ? "#475569" : tCpk >= 1.33 ? "#22c55e" : tCpk >= 1.00 ? "#f59e0b" : "#ef4444";
            const vColor = vCpk == null ? "#475569" : vCpk >= 1.33 ? "#22c55e" : vCpk >= 1.00 ? "#f59e0b" : "#ef4444";
            return (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 12px", background:"rgba(255,255,255,0.02)", borderRadius:8, border:"1px solid rgba(255,255,255,0.06)", cursor:"pointer" }}
                onClick={() => setActiveResult(h.result || null)}
                onMouseEnter={e => e.currentTarget.style.background="rgba(255,255,255,0.05)"}
                onMouseLeave={e => e.currentTarget.style.background="rgba(255,255,255,0.02)"}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, color:"#e2e8f0", fontWeight:600 }}>{h.batch_id}</div>
                  <div style={{ fontSize:11, color:"#475569" }}>{h.analyzed_at} · {h.thickness_n || 0} 筆</div>
                </div>
                <div style={{ display:"flex", gap:16 }}>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:10, color:"#64748b" }}>Thickness Cpk</div>
                    <div style={{ fontSize:13, fontWeight:700, color:tColor }}>{tCpk != null ? tCpk.toFixed(2) : "–"}</div>
                  </div>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:10, color:"#64748b" }}>TTV Cpk</div>
                    <div style={{ fontSize:13, fontWeight:700, color:vColor }}>{vCpk != null ? vCpk.toFixed(2) : "–"}</div>
                  </div>
                  {h.needs_attention && <span style={{ fontSize:11, color:"#ef4444", alignSelf:"center" }}>⚠ 異常</span>}
                  {h.has_raw_rows && (
                    <a href={`/api/spc/fosb?batch_id=${encodeURIComponent(h.batch_id)}`}
                      download onClick={e => e.stopPropagation()}
                      style={{ fontSize:11, color:"#7dd3fc", background:"rgba(56,189,248,0.08)", border:"1px solid rgba(56,189,248,0.2)", borderRadius:6, padding:"3px 8px", textDecoration:"none", alignSelf:"center", whiteSpace:"nowrap" }}>
                      ↓ FOSB
                    </a>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  );
}


// ─── ENV PARTICLE COUNTER PANEL ──────────────────────────────────────────────

function EnvParticlePanel() {
  const MONTHS = ["2025-11","2025-12","2026-01","2026-02","2026-03"];
  const MONTH_LABEL = { "2025-11":"25/11月","2025-12":"25/12月","2026-01":"26/01月","2026-02":"26/02月","2026-03":"26/03月" };

  // Monthly aggregation
  const mStats = {};
  MONTHS.forEach(m => { mStats[m] = { runs:0, passes:0, ch1sum:0, ch1n:0, ch1maxAll:0, ch3sum:0 }; });
  ENV_PARTICLE_DATA.forEach(r => {
    const m = r.date.substring(0, 7);
    if (!mStats[m]) return;
    const ok = ENV_PARTICLE_OK(r);
    mStats[m].runs++;
    if (ok) { mStats[m].passes++; mStats[m].ch1sum += r.ch1avg; mStats[m].ch1n++; mStats[m].ch3sum += r.ch3avg; }
    if (r.ch1max > mStats[m].ch1maxAll) mStats[m].ch1maxAll = r.ch1max;
  });

  const totalRuns   = ENV_PARTICLE_DATA.length;
  const totalPasses = ENV_PARTICLE_DATA.filter(ENV_PARTICLE_OK).length;
  const passRate    = Math.round(totalPasses / totalRuns * 100);
  const highEvents  = ENV_PARTICLE_DATA.filter(r => !ENV_PARTICLE_OK(r));
  const latestRun   = ENV_PARTICLE_DATA[ENV_PARTICLE_DATA.length - 1];

  const pctCol = v => v >= 95 ? "#22c55e" : v >= 85 ? "#f59e0b" : "#ef4444";

  const panel = (children, style = {}) => (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20, ...style }}>
      {children}
    </div>
  );
  const secTitle = t => <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>{t}</div>;

  // Monthly pass rate bar chart (inline SVG)
  const MonthPassBars = () => {
    const W=400, H=130, pL=8, pR=8, pT=16, pB=28;
    const iW=W-pL-pR, iH=H-pT-pB;
    const data = MONTHS.map(m => ({ label: MONTH_LABEL[m], pct: mStats[m].runs > 0 ? Math.round(mStats[m].passes/mStats[m].runs*100) : 0, runs: mStats[m].runs }));
    const slotW = iW / data.length;
    const barW  = Math.max(slotW - 10, 8);
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible", display:"block" }}>
        {[80,90,100].map(v => {
          const y = pT + iH - (v/100)*iH;
          return <g key={v}><line x1={pL} y1={y} x2={pL+iW} y2={y} stroke="rgba(255,255,255,0.05)" /><text x={pL-3} y={y+4} textAnchor="end" fill="#475569" fontSize={8}>{v}</text></g>;
        })}
        {data.map((d, i) => {
          const barH = Math.round(d.pct / 100 * iH);
          const x = pL + i * slotW + (slotW - barW) / 2;
          const y = pT + iH - barH;
          const col = pctCol(d.pct);
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={barH} rx={3} fill={col} opacity={0.85} />
              <text x={x+barW/2} y={y-3} textAnchor="middle" fill="#cbd5e1" fontSize={9}>{d.pct}%</text>
              <text x={x+barW/2} y={H-4} textAnchor="middle" fill="#475569" fontSize={8}>{d.label}</text>
            </g>
          );
        })}
      </svg>
    );
  };

  // Ch1 monthly average of normal runs (line chart)
  const Ch1AvgLine = () => {
    const pts = MONTHS.map(m => ({ label: MONTH_LABEL[m], v: mStats[m].ch1n > 0 ? Math.round(mStats[m].ch1sum / mStats[m].ch1n * 10) / 10 : 0 }));
    const maxV = Math.max(...pts.map(p => p.v), 1);
    const W=340, H=110, pL=32, pR=8, pT=14, pB=24;
    const iW=W-pL-pR, iH=H-pT-pB;
    const xStep = iW / (pts.length - 1);
    const pArr = pts.map((p, i) => ({ x: pL + i * xStep, y: pT + iH - (p.v / maxV) * iH, ...p }));
    const path = pArr.map((p, i) => `${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible", display:"block" }}>
        {[0,0.5,1].map(f => {
          const y = pT+iH-f*iH; const v = (f*maxV).toFixed(0);
          return <g key={f}><line x1={pL} y1={y} x2={pL+iW} y2={y} stroke="rgba(255,255,255,0.05)" /><text x={pL-4} y={y+4} textAnchor="end" fill="#475569" fontSize={8}>{v}</text></g>;
        })}
        <path d={path} fill="none" stroke="#38bdf8" strokeWidth={2} strokeLinejoin="round" />
        {pArr.map((p, i) => (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r={3} fill="#38bdf8" />
            <text x={p.x} y={p.y-6} textAnchor="middle" fill="#cbd5e1" fontSize={8}>{p.v}</text>
            <text x={p.x} y={H-4} textAnchor="middle" fill="#475569" fontSize={7.5}>{p.label}</text>
          </g>
        ))}
      </svg>
    );
  };

  return (
    <div style={{ marginTop:24 }}>
      {/* Section header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:800, color:"#e2e8f0" }}>潔淨室粒子計數監控</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
            Model 9303 · 0.3µm / 0.5µm / 5.0µm · 2025年11月 ～ 2026年03月 · 共 {totalRuns} 筆 Run
          </div>
        </div>
        <div style={{ fontSize:11, color:"#94a3b8", background:"rgba(56,189,248,0.08)", border:"1px solid rgba(56,189,248,0.2)", borderRadius:6, padding:"4px 10px" }}>
          超標：Ch1/Ch2 ≥ 500 或 Ch3 {">"} 10
        </div>
      </div>

      {/* KPI cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12, marginBottom:14 }}>
        {[
          { label:"量測 Run 總數",   value: totalRuns + " 筆", color:"#38bdf8",  desc:"Model 9303 單點" },
          { label:"正常 Run 合格率", value: passRate + "%",    color: pctCol(passRate), desc:`${totalPasses} / ${totalRuns} 筆正常` },
          { label:"最新 Run Ch1均值",value: latestRun.ch1avg + " ct/m³", color: latestRun.ch1avg > 100 ? "#f59e0b" : "#22c55e", desc:`${latestRun.date} ${latestRun.session}` },
          { label:"超標事件總計",    value: highEvents.length + " 次",  color: highEvents.length === 0 ? "#22c55e" : highEvents.length <= 5 ? "#f59e0b" : "#ef4444", desc:"2025/11 ~ 2026/03" },
        ].map(k => (
          <div key={k.label} style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${k.color}28`, borderRadius:12, padding:"14px 14px" }}>
            <div style={{ fontSize:22, fontWeight:800, color:k.color, lineHeight:1 }}>{k.value}</div>
            <div style={{ fontSize:11, color:"#94a3b8", marginTop:5 }}>{k.label}</div>
            <div style={{ fontSize:10, color:"#475569", marginTop:2 }}>{k.desc}</div>
          </div>
        ))}
      </div>

      {/* Charts row */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
        {panel(<>
          {secTitle("月合格率（%）—各月正常Run佔比")}
          <MonthPassBars />
        </>)}
        {panel(<>
          {secTitle("月均 Ch1 (0.3µm) — 正常Run平均值")}
          <Ch1AvgLine />
          <div style={{ fontSize:11, color:"#64748b", marginTop:6 }}>僅計入正常Run（排除超標筆），單位：counts/m³</div>
        </>)}
      </div>

      {/* Monthly summary table */}
      {panel(<>
        {secTitle("各月統計摘要")}
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ background:"rgba(255,255,255,0.04)" }}>
              {["月份","Run數","正常","超標","合格率","Ch1均值(正常)","Ch1最大值","Ch3均值(正常)"].map(h => (
                <th key={h} style={{ padding:"7px 12px", textAlign: h==="月份"?"left":"right", color:"#64748b", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.07)", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {MONTHS.map((m, i) => {
              const s = mStats[m];
              const pr = s.runs > 0 ? Math.round(s.passes/s.runs*100) : 0;
              const ch1n = s.ch1n > 0 ? (s.ch1sum/s.ch1n).toFixed(1) : "–";
              const ch3n = s.ch1n > 0 ? (s.ch3sum/s.ch1n).toFixed(2) : "–";
              const col  = pctCol(pr);
              return (
                <tr key={m} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)", background: i%2===0?"transparent":"rgba(255,255,255,0.015)" }}>
                  <td style={{ padding:"6px 12px", color:"#e2e8f0", fontWeight:600 }}>{MONTH_LABEL[m]}</td>
                  <td style={{ padding:"6px 12px", color:"#94a3b8", textAlign:"right" }}>{s.runs}</td>
                  <td style={{ padding:"6px 12px", color:"#22c55e", textAlign:"right", fontWeight:600 }}>{s.passes}</td>
                  <td style={{ padding:"6px 12px", color: s.runs-s.passes>0?"#ef4444":"#64748b", textAlign:"right" }}>{s.runs-s.passes}</td>
                  <td style={{ padding:"6px 12px", textAlign:"right" }}><span style={{ fontWeight:700, color:col }}>{pr}%</span></td>
                  <td style={{ padding:"6px 12px", color:"#94a3b8", textAlign:"right" }}>{ch1n}</td>
                  <td style={{ padding:"6px 12px", color: s.ch1maxAll>=500?"#ef4444":"#64748b", textAlign:"right", fontWeight: s.ch1maxAll>=500?700:400 }}>{s.ch1maxAll.toLocaleString()}</td>
                  <td style={{ padding:"6px 12px", color:"#64748b", textAlign:"right" }}>{ch3n}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </>, { marginBottom:14 })}

      {/* High-value events */}
      {highEvents.length > 0 && panel(<>
        {secTitle(`超標事件明細（共 ${highEvents.length} 筆）`)}
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:"rgba(255,255,255,0.04)" }}>
                {["日期","Run","時段","Ch1最大","Ch2最大","Ch3最大","超標原因","備註"].map(h => (
                  <th key={h} style={{ padding:"6px 10px", textAlign: h==="日期"||h==="時段"||h==="超標原因"||h==="備註"?"left":"right", color:"#64748b", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.07)", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {highEvents.map((r, i) => {
                const reasons = [];
                if (r.ch1max >= 500) reasons.push(`Ch1=${r.ch1max.toLocaleString()}`);
                if (r.ch2max >= 500) reasons.push(`Ch2=${r.ch2max.toLocaleString()}`);
                if (r.ch3max > 10)   reasons.push(`Ch3=${r.ch3max}`);
                return (
                  <tr key={i} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)", background: i%2===0?"transparent":"rgba(255,255,255,0.015)" }}>
                    <td style={{ padding:"5px 10px", color:"#e2e8f0" }}>{r.date}</td>
                    <td style={{ padding:"5px 10px", color:"#94a3b8", textAlign:"right" }}>{r.run}</td>
                    <td style={{ padding:"5px 10px", color:"#94a3b8" }}>{r.session}</td>
                    <td style={{ padding:"5px 10px", color: r.ch1max>=500?"#ef4444":"#94a3b8", textAlign:"right", fontWeight: r.ch1max>=500?700:400 }}>{r.ch1max.toLocaleString()}</td>
                    <td style={{ padding:"5px 10px", color: r.ch2max>=500?"#ef4444":"#94a3b8", textAlign:"right", fontWeight: r.ch2max>=500?700:400 }}>{r.ch2max.toLocaleString()}</td>
                    <td style={{ padding:"5px 10px", color: r.ch3max>10?"#f59e0b":"#94a3b8",  textAlign:"right", fontWeight: r.ch3max>10?700:400 }}>{r.ch3max}</td>
                    <td style={{ padding:"5px 10px", color:"#ef4444", fontSize:11 }}>{reasons.join(" / ")}</td>
                    <td style={{ padding:"5px 10px", color:"#6366f1", fontSize:11 }}>{r.note || ""}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </>)}
    </div>
  );
}

// ─── GLASS WAFER YIELD PANEL ─────────────────────────────────────────────────

function GlassYieldPanel() {
  const TANK_WARN = 5000;
  const TANK_MAX  = 10000;

  const data = GLASS_YIELD_DATA.map(r => ({
    ...r,
    fy: r.toWash > 0 ? Math.round(r.ok / r.toWash * 1000) / 10 : null,
  }));

  const withFy      = data.filter(r => r.fy !== null);
  const avgYield    = withFy.length > 0
    ? (withFy.reduce((s, r) => s + r.fy, 0) / withFy.length).toFixed(1) : null;
  const latestRow   = data[data.length - 1];
  const worstBatch  = withFy.length > 0
    ? withFy.reduce((w, r) => r.fy < w.fy ? r : w) : null;
  const totalWash   = data.reduce((s, r) => s + r.toWash, 0);
  const totalOk     = data.reduce((s, r) => s + r.ok, 0);
  const overallFy   = totalWash > 0 ? (totalOk / totalWash * 100).toFixed(1) : null;

  const fyColor = v => v === null ? "#475569" : v >= 93 ? "#22c55e" : v >= 85 ? "#f59e0b" : "#ef4444";

  const panel = (children, style = {}) => (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20, ...style }}>
      {children}
    </div>
  );
  const secTitle = t => (
    <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>{t}</div>
  );

  // Yield bar chart — SVG, custom color per bar
  const YieldBars = () => {
    const W = 560, H = 170, padL = 32, padR = 8, padT = 20, padB = 42;
    const innerW = W - padL - padR;
    const innerH = H - padT - padB;
    const domMin = 75, domMax = 100, domRange = domMax - domMin;
    const slotW  = innerW / data.length;
    const barW   = Math.max(slotW - 5, 4);
    const toY    = v => padT + innerH - Math.round(Math.max(v - domMin, 0) / domRange * innerH);
    return (
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:"visible", display:"block" }}>
        {[75, 80, 85, 90, 95, 100].map(v => {
          const y = toY(v);
          return (
            <g key={v}>
              <line x1={padL} y1={y} x2={padL + innerW} y2={y} stroke="rgba(255,255,255,0.05)" />
              <text x={padL - 4} y={y + 4} textAnchor="end" fill="#475569" fontSize={8}>{v}</text>
            </g>
          );
        })}
        {/* 93 % threshold line */}
        {(() => { const y = toY(93); return <line x1={padL} y1={y} x2={padL+innerW} y2={y} stroke="rgba(34,197,94,0.25)" strokeDasharray="4 3" />; })()}
        {data.map((r, i) => {
          const fy = r.fy !== null ? r.fy : 0;
          const col = r.fy !== null ? fyColor(fy) : "#334155";
          const barH = Math.max(Math.round(Math.max(fy - domMin, 0) / domRange * innerH), 2);
          const x   = padL + i * slotW + (slotW - barW) / 2;
          const y   = padT + innerH - barH;
          const labelY = padT + innerH + 12;
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={barH} rx={2} fill={col} opacity={0.85} />
              {r.fy !== null && (
                <text x={x + barW / 2} y={y - 3} textAnchor="middle" fill="#cbd5e1" fontSize={7.5}>{fy.toFixed(1)}</text>
              )}
              <text
                x={x + barW / 2} y={labelY}
                textAnchor="end"
                fill="#475569" fontSize={7.5}
                transform={`rotate(-40, ${x + barW / 2}, ${labelY})`}
              >{r.name}</text>
              {r.note && (
                <text x={x + barW / 2} y={padT + innerH + 30} textAnchor="middle" fill="#6366f1" fontSize={7}>↑</text>
              )}
            </g>
          );
        })}
      </svg>
    );
  };

  return (
    <div style={{ marginTop:24 }}>
      {/* Section header */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:800, color:"#e2e8f0" }}>玻璃基板清洗良率監控</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
            RECYCLE GLASS NEG ABC-1（JEPE）· 2026年01月～03月 · 共 {data.length} 批
          </div>
        </div>
        <div style={{ fontSize:11, color:"#94a3b8", background:"rgba(99,102,241,0.1)", border:"1px solid rgba(99,102,241,0.25)", borderRadius:6, padding:"4px 10px" }}>
          ⓘ 僅顯示原始良率（不含重工）
        </div>
      </div>

      {/* KPI mini-cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12, marginBottom:14 }}>
        {[

// ─── SVG CHART PRIMITIVES ────────────────────────────────────────────────────

function SvgBarChart({ data, width = 420, height = 150, color = "#3b82f6" }) {
  if (!data || data.length === 0) return <div style={{ color:"#475569", fontSize:12, textAlign:"center", padding:16 }}>尚無資料</div>;
  const max = Math.max(...data.map(d => d.value), 1);
  const padL = 8, padR = 8, padB = 22, padT = 16;
  const innerW = width - padL - padR;
  const innerH = height - padT - padB;
  const slotW = innerW / data.length;
  const barW = Math.max(Math.min(slotW - 6, 36), 6);
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow:"visible", display:"block" }}>
      {[0, 0.5, 1].map(pct => {
        const y = padT + innerH - pct * innerH;
        return <line key={pct} x1={padL} y1={y} x2={padL + innerW} y2={y} stroke="rgba(255,255,255,0.05)" />;
      })}
      {data.map((d, i) => {
        const barH = Math.max(Math.round((d.value / max) * innerH), d.value > 0 ? 2 : 0);
        const x = padL + i * slotW + (slotW - barW) / 2;
        const y = padT + innerH - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx={3} fill={color} opacity={0.85} />
            <text x={x + barW / 2} y={height - 4} textAnchor="middle" fill="#475569" fontSize={9}>{d.label}</text>
            {d.value > 0 && <text x={x + barW / 2} y={y - 3} textAnchor="middle" fill="#cbd5e1" fontSize={9}>{d.value}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function SvgLineChart({ data, width = 420, height = 140, color = "#22c55e", domainMin, domainMax }) {
  if (!data || data.length < 2) return <div style={{ color:"#475569", fontSize:12, textAlign:"center", padding:16 }}>需 2 筆以上資料</div>;
  const vals = data.map(d => d.value);
  const rawMin = domainMin !== undefined ? domainMin : Math.min(...vals);
  const rawMax = domainMax !== undefined ? domainMax : Math.max(...vals);
  const range = rawMax - rawMin || 1;
  const padL = 36, padR = 12, padT = 16, padB = 24;
  const w = width - padL - padR;
  const h = height - padT - padB;
  const xStep = w / (data.length - 1);
  const pts = data.map((d, i) => ({
    x: padL + i * xStep,
    y: padT + h - ((d.value - rawMin) / range) * h,
    label: d.label,
    value: d.value,
  }));
  const linePath = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
  const areaPath = linePath + ` L ${pts[pts.length - 1].x.toFixed(1)} ${(padT + h).toFixed(1)} L ${pts[0].x.toFixed(1)} ${(padT + h).toFixed(1)} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ overflow:"visible", display:"block" }}>
      {[0, 0.5, 1].map(pct => {
        const y = padT + h - pct * h;
        const val = rawMin + pct * range;
        return (
          <g key={pct}>
            <line x1={padL} y1={y} x2={padL + w} y2={y} stroke="rgba(255,255,255,0.05)" />
            <text x={padL - 4} y={y + 4} textAnchor="end" fill="#475569" fontSize={8}>{val.toFixed(1)}</text>
          </g>
        );
      })}
      <path d={areaPath} fill={color} opacity={0.08} />
      <path d={linePath} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" />
      {pts.map((p, i) => (
        <g key={i}>
          <circle cx={p.x} cy={p.y} r={3} fill={color} />
          <text x={p.x} y={height - 4} textAnchor="middle" fill="#475569" fontSize={8}>{p.label}</text>
          <text x={p.x} y={p.y - 6} textAnchor="middle" fill="#cbd5e1" fontSize={8}>{p.value.toFixed(1)}</text>
        </g>
      ))}
    </svg>
  );
}

function SvgDonut({ slices, size = 110 }) {
  const total = slices.reduce((s, x) => s + x.value, 0) || 1;
  const cx = size / 2, cy = size / 2, r = size * 0.4, ir = size * 0.27;
  let angle = -Math.PI / 2;
  const paths = slices.map(sl => {
    const sweep = (sl.value / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle),  y1 = cy + r * Math.sin(angle);
    angle += sweep;
    const x2 = cx + r * Math.cos(angle),  y2 = cy + r * Math.sin(angle);
    const ix1 = cx + ir * Math.cos(angle), iy1 = cy + ir * Math.sin(angle);
    const ix2 = cx + ir * Math.cos(angle - sweep), iy2 = cy + ir * Math.sin(angle - sweep);
    const lg = sweep > Math.PI ? 1 : 0;
    return (
      <path key={sl.label}
        d={`M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} L ${ix1.toFixed(2)} ${iy1.toFixed(2)} A ${ir} ${ir} 0 ${lg} 0 ${ix2.toFixed(2)} ${iy2.toFixed(2)} Z`}
        fill={sl.color} opacity={0.9} />
    );
  });
  return <svg width={size} height={size} style={{ display:"block" }}>{paths}</svg>;
}

function KpiDashboard({ instruments, suppliers, nonConformances, auditPlans, envRecords, prodRecords, qualityRecords }) {
  const safeArr = v => (Array.isArray(v) ? v : []);
  const prods    = safeArr(prodRecords);
  const ncs      = safeArr(nonConformances);
  const envs     = safeArr(envRecords);
  const supps    = safeArr(suppliers);
  const audits   = safeArr(auditPlans);
  const qrs      = safeArr(qualityRecords);

  // ── SPC Cpk（從歷史記錄 API 抓最新一筆）──────────────────────
  const [latestCpk, setLatestCpk] = useState(null);
  useEffect(() => {
    fetch("/api/spc/history")
      .then(r => r.json())
      .then(d => {
        const items = d.items || [];
        if (items.length > 0) setLatestCpk({ thickness: items[0].thickness_cpk, ttv: items[0].ttv_cpk, batch: items[0].batch_id });
      })
      .catch(() => {});
  }, []);

  // ── 良品率折線 ──────────────────────────────────────────────
  const yieldData = prods.map(r => ({
    label: (r.lot || "").length >= 11 ? (r.lot || "").substring(7, 11) : (r.lot || "").substring(0, 6) || "?",
    value: parseFloat(r.yieldRate) || 0,
  }));
  const avgYield = yieldData.length > 0
    ? (yieldData.reduce((s, d) => s + d.value, 0) / yieldData.length).toFixed(1) : null;

  // ── NC 月度柱狀 ─────────────────────────────────────────────
  const ncByMonth = {};
  ncs.forEach(nc => {
    const m = (nc.date || "").substring(0, 7) || "未知";
    ncByMonth[m] = (ncByMonth[m] || 0) + 1;
  });
  const ncMonthData = Object.entries(ncByMonth).sort().slice(-6)
    .map(([k, v]) => ({ label: k.substring(5) + "月", value: v }));
  const openNc = ncs.filter(n => n.status !== "已關閉").length;

  // ── 環境合格率（粒子計數器 Model 9303）──────────────────────
  const envParticleTotal  = ENV_PARTICLE_DATA.length;
  const envParticlePass   = ENV_PARTICLE_DATA.filter(ENV_PARTICLE_OK).length;
  const envPassRate = Math.round(envParticlePass / envParticleTotal * 100);
  // 各月合格率 for mini bar chart
  const envMonthBars = ["2025-11","2025-12","2026-01","2026-02","2026-03"].map(m => {
    const mrs = ENV_PARTICLE_DATA.filter(r => r.date.startsWith(m));
    const mp  = mrs.filter(ENV_PARTICLE_OK).length;
    return { label: m.slice(2,4)+"/"+m.slice(5), value: mrs.length > 0 ? Math.round(mp/mrs.length*100) : 0 };
  });

  // ── 供應商 ──────────────────────────────────────────────────
  const avgSupplierScore = supps.length > 0
    ? (supps.reduce((s, x) => s + (parseFloat(x.score) || 0), 0) / supps.length).toFixed(0) : null;

  // ── 稽核完成率 ──────────────────────────────────────────────
  const auditTotal = audits.length;
  const auditDone  = audits.filter(a => a.status === "已完成").length;
  const auditRate  = auditTotal > 0 ? Math.round(auditDone / auditTotal * 100) : null;
  const auditSlices = [
    { label: "已完成", value: auditDone,                                               color: "#22c55e" },
    { label: "進行中", value: audits.filter(a => a.status === "進行中").length,         color: "#3b82f6" },
    { label: "計畫中", value: audits.filter(a => a.status === "計畫中").length,         color: "#6366f1" },
    { label: "逾期",   value: audits.filter(a => a.status === "逾期").length,           color: "#ef4444" },
  ].filter(s => s.value > 0);

  // ── 不良原因 Pareto ─────────────────────────────────────────
  const defectCount = {};
  prods.forEach(r => (r.defectReasons || []).forEach(reason => { defectCount[reason] = (defectCount[reason] || 0) + 1; }));
  const paretoData = Object.entries(defectCount).sort((a, b) => b[1] - a[1]).slice(0, 6)
    .map(([k, v]) => ({ label: k.length > 8 ? k.substring(0, 8) + "…" : k, value: v }));

  // ── 進料合格率 ──────────────────────────────────────────────
  const qcTotal = qrs.length;
  const qcPass  = qrs.filter(r => (r.result || "").toUpperCase() === "PASS").length;
  const qcRate  = qcTotal > 0 ? Math.round(qcPass / qcTotal * 100) : null;

  // ── KPI hero cards ──────────────────────────────────────────
  const heroCards = [
    {
      label: "平均良品率",
      value: avgYield !== null ? avgYield + "%" : "–",
      color: avgYield === null ? "#475569" : parseFloat(avgYield) >= 98 ? "#22c55e" : parseFloat(avgYield) >= 95 ? "#f59e0b" : "#ef4444",
      desc:  `${prods.length} 批次`,
    },
    {
      label: "未關閉不符合",
      value: openNc,
      color: openNc === 0 ? "#22c55e" : openNc <= 3 ? "#f59e0b" : "#ef4444",
      desc:  `合計 ${ncs.length} 項`,
    },
    {
      label: "環境合格率",
      value: envPassRate + "%",
      color: envPassRate >= 90 ? "#22c55e" : envPassRate >= 80 ? "#f59e0b" : "#ef4444",
      desc:  `粒子計數 ${envParticleTotal} 筆`,
    },
    {
      label: "供應商平均分",
      value: avgSupplierScore !== null ? avgSupplierScore : "–",
      color: avgSupplierScore === null ? "#475569" : parseFloat(avgSupplierScore) >= 85 ? "#22c55e" : parseFloat(avgSupplierScore) >= 70 ? "#f59e0b" : "#ef4444",
      desc:  `${supps.length} 家`,
    },
    {
      label: "稽核完成率",
      value: auditRate !== null ? auditRate + "%" : "–",
      color: auditRate === null ? "#475569" : auditRate >= 80 ? "#22c55e" : auditRate >= 50 ? "#f59e0b" : "#ef4444",
      desc:  `${auditDone}/${auditTotal} 場`,
    },
    {
      label: "進料合格率",
      value: qcRate !== null ? qcRate + "%" : "–",
      color: qcRate === null ? "#475569" : qcRate >= 95 ? "#22c55e" : qcRate >= 80 ? "#f59e0b" : "#ef4444",
      desc:  `${qcTotal} 批`,
    },
    {
      label: "Thickness Cpk",
      value: latestCpk && latestCpk.thickness != null ? latestCpk.thickness.toFixed(2) : "–",
      color: !latestCpk || latestCpk.thickness == null ? "#475569"
        : latestCpk.thickness >= 1.33 ? "#22c55e"
        : latestCpk.thickness >= 1.00 ? "#f59e0b" : "#ef4444",
      desc: latestCpk ? latestCpk.batch : "尚無 SPC 記錄",
    },
    {
      label: "TTV Cpk",
      value: latestCpk && latestCpk.ttv != null ? latestCpk.ttv.toFixed(2) : "–",
      color: !latestCpk || latestCpk.ttv == null ? "#475569"
        : latestCpk.ttv >= 1.33 ? "#22c55e"
        : latestCpk.ttv >= 1.00 ? "#f59e0b" : "#ef4444",
      desc: latestCpk ? latestCpk.batch : "尚無 SPC 記錄",
    },
  ];

  const panel = (children, style = {}) => (
    <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:20, ...style }}>
      {children}
    </div>
  );
  const sectionTitle = t => <div style={{ fontSize:13, fontWeight:700, color:"#e2e8f0", marginBottom:14 }}>{t}</div>;

  return (
    <div>
      {/* ── 標題 ── */}
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:20, fontWeight:800, color:"#e2e8f0" }}>生產績效儀表板</div>
        <div style={{ fontSize:13, color:"#64748b", marginTop:4 }}>
          高階主管視圖 — {new Date().toLocaleString("zh-TW", { year:"numeric", month:"long", day:"numeric", hour:"2-digit", minute:"2-digit" })}
        </div>
      </div>

      {/* ── Hero KPI 卡片 ── */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(150px, 1fr))", gap:12, marginBottom:20 }}>
        {heroCards.map(k => (
          <div key={k.label} style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${k.color}30`, borderRadius:14, padding:"18px 16px" }}>
            <div style={{ fontSize:28, fontWeight:800, color:k.color, lineHeight:1 }}>{k.value}</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginTop:6 }}>{k.label}</div>
            <div style={{ fontSize:11, color:"#475569", marginTop:3 }}>{k.desc}</div>
          </div>
        ))}
      </div>

      {/* ── 環境粒子計數監控 ── */}
      <EnvParticlePanel />

      {/* ── 玻璃基板良率監控 ── */}

      {/* ── 第一排：良品率 + NC 月度 ── */}
