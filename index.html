        {panel(<>
          {sectionTitle("批次良品率趨勢（%）")}
          <SvgLineChart data={yieldData} color="#22c55e" domainMin={90} domainMax={100} />
        </>)}
        {panel(<>
          {sectionTitle("不符合項月度件數")}
          {ncMonthData.length === 0
            ? <div style={{ color:"#475569", fontSize:12 }}>尚無不符合記錄</div>
            : <SvgBarChart data={ncMonthData} color="#f59e0b" />
          }
        </>)}
      </div>

      {/* ── 第二排：粒子計數月合格率 + Pareto ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
        {panel(<>
          {sectionTitle("粒子計數月合格率（%）")}
          <SvgBarChart data={envMonthBars} color="#38bdf8" />
          <div style={{ fontSize:11, color:"#64748b", marginTop:4 }}>{"Model 9303 · Ch1/Ch2≥500或Ch3>10超標"}</div>
        </>)}
        {panel(<>
          {sectionTitle("不良原因 Pareto（件）")}
          {paretoData.length === 0
            ? <div style={{ color:"#475569", fontSize:12 }}>尚無不良原因記錄</div>
            : <SvgBarChart data={paretoData} color="#ef4444" />
          }
        </>)}
      </div>

      {/* ── 第三排：供應商橫條 + 稽核圓環 ── */}
      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr", gap:16 }}>
        {panel(<>
          {sectionTitle("供應商評分一覽")}
          <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
            {supps.length === 0 && <div style={{ color:"#475569", fontSize:12 }}>尚無供應商記錄</div>}
            {supps.slice(0, 8).map(s => {
              const score = parseFloat(s.score) || 0;
              const barColor = score >= 85 ? "#22c55e" : score >= 70 ? "#f59e0b" : "#ef4444";
              return (
                <div key={s.id || s.name} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ fontSize:12, color:"#94a3b8", width:72, flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.name || "–"}</div>
                  <div style={{ flex:1, background:"rgba(255,255,255,0.05)", borderRadius:4, height:10, overflow:"hidden" }}>
                    <div style={{ width:score + "%", height:"100%", background:barColor, borderRadius:4, transition:"width 0.6s ease" }} />
                  </div>
                  <div style={{ fontSize:12, fontWeight:700, color:barColor, width:28, textAlign:"right", flexShrink:0 }}>{score}</div>
                </div>
              );
            })}
          </div>
        </>)}
        {panel(<>
          {sectionTitle("稽核計畫完成率")}
          {auditSlices.length === 0
            ? <div style={{ color:"#475569", fontSize:12 }}>尚無稽核計畫</div>
            : (
              <div style={{ display:"flex", alignItems:"center", gap:20 }}>
                <SvgDonut slices={auditSlices} size={110} />
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {[
                    { label:"已完成", color:"#22c55e", count: auditDone },
                    { label:"進行中", color:"#3b82f6", count: audits.filter(a => a.status === "進行中").length },
                    { label:"計畫中", color:"#6366f1", count: audits.filter(a => a.status === "計畫中").length },
                    { label:"逾期",   color:"#ef4444", count: audits.filter(a => a.status === "逾期").length },
                  ].map(item => (
                    <div key={item.label} style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:item.color, flexShrink:0 }} />
                      <div style={{ fontSize:11, color:"#94a3b8" }}>{item.label}</div>
                      <div style={{ fontSize:12, fontWeight:700, color:item.color, marginLeft:"auto", paddingLeft:8 }}>{item.count}</div>
                    </div>
                  ))}
                  <div style={{ fontSize:13, fontWeight:800, color: auditRate !== null ? (auditRate >= 80 ? "#22c55e" : auditRate >= 50 ? "#f59e0b" : "#ef4444") : "#475569", marginTop:4, borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:6 }}>
                    完成率 {auditRate !== null ? auditRate + "%" : "–"}
                  </div>
                </div>
              </div>
            )
          }
        </>)}
      </div>
    </div>
  );
}


// ─── ERP 主資料模組元件 ─────────────────────────────────────────────────────────
const erpInputStyle = { width:"100%", padding:"9px 12px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(148,163,184,0.18)", borderRadius:8, color:"#e2e8f0", fontSize:13, outline:"none" };

function ErpWorkOrderPanel({ onNavigate, onCreateNc }) {
  const [wos, setWos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all");
  const [q, setQ] = useState("");
  const [editModal, setEditModal] = useState(null);
  const [form, setForm] = useState({});
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    fetchErpList("work-orders").then(data => { setWos(data); setLoading(false); });
  }, []);

  const calcYield = wo => {
    const total = (wo.good_qty || 0) + (wo.ng_qty || 0);
    return total > 0 ? Math.round((wo.good_qty || 0) / total * 1000) / 10 : null;
  };
  const yieldColor = y => y === null ? "#64748b" : y >= 95 ? "#22c55e" : y >= 90 ? "#eab308" : "#ef4444";
  const statusLabel = s => ({ draft:"草稿", released:"已下達", in_progress:"進行中", completed:"已完成", closed:"已關閉" }[s] || s);
  const statusColor = s => ({ draft:"#64748b", released:"#60a5fa", in_progress:"#f97316", completed:"#22c55e", closed:"#94a3b8" }[s] || "#64748b");

  const filtered = wos
    .filter(w => filter === "all" || w.wo_status === filter)
    .filter(w => !q || w.wo_no.toLowerCase().includes(q.toLowerCase()));

  const yieldWos = wos.map(w => calcYield(w)).filter(y => y !== null);
  const avgYield = yieldWos.length ? Math.round(yieldWos.reduce((a, b) => a + b, 0) / yieldWos.length * 10) / 10 : null;
  const lowYieldCount = wos.filter(w => { const y = calcYield(w); return y !== null && y < 90; }).length;

  async function handleUpdate() {
    setBusy(true);
    try {
      await erpApiJson(`/api/orders/work-orders/${editModal.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ good_qty: parseFloat(form.good) || 0, ng_qty: parseFloat(form.ng) || 0, wo_status: form.status }),
      });
      setWos(prev => prev.map(w => w.id === editModal.id
        ? { ...w, good_qty: parseFloat(form.good) || 0, ng_qty: parseFloat(form.ng) || 0, wo_status: form.status }
        : w));
      setEditModal(null);
      setMsg("已更新工單數量。");
    } catch(e) { setMsg("更新失敗：" + e.message); }
    finally { setBusy(false); }
  }

  function openCreateNc(wo) {
    const y = calcYield(wo);
    onCreateNc?.({ type:"製程異常", description:`工單 ${wo.wo_no} 良率異常（${y}%）`, severity:"重大", wo_id: wo.id, wo_no: wo.wo_no, product_id: wo.product_id || "" });
    onNavigate?.("nonconformance");
  }

  if (loading) return <div style={{ color:"#64748b", padding:40, textAlign:"center" }}>載入工單中...</div>;

  return (
    <div>
      <SectionHeader title="工單良率管理" count={wos.length} color="#f97316" />
      <div style={{ display:"flex", gap:12, marginBottom:20, flexWrap:"wrap" }}>
        <StatCard label="進行中" value={wos.filter(w=>w.wo_status==="in_progress").length} color="#f97316" />
        <StatCard label="已完成" value={wos.filter(w=>w.wo_status==="completed").length} color="#22c55e" />
        <StatCard label="平均良率" value={avgYield !== null ? avgYield + "%" : "-"} color="#60a5fa" />
        <StatCard label="良率 < 90%" value={lowYieldCount} color={lowYieldCount > 0 ? "#ef4444" : "#22c55e"} sub={lowYieldCount > 0 ? "需關注" : "無異常"} />
      </div>
      {msg && <div style={{ marginBottom:14, padding:"10px 16px", background:"rgba(99,102,241,0.1)", border:"1px solid rgba(99,102,241,0.3)", borderRadius:8, color:"#a5b4fc", fontSize:13 }}>{msg}</div>}
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{ ...erpInputStyle, width:130 }}>
          <option value="all">全部狀態</option>
          {["draft","released","in_progress","completed","closed"].map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
        </select>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="搜尋工單號..." style={{ ...erpInputStyle, width:180 }} />
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {filtered.length === 0 && <div style={{ color:"#64748b", fontSize:13, padding:20, textAlign:"center" }}>目前沒有符合條件的工單</div>}
        {filtered.map(wo => {
          const y = calcYield(wo);
          const yc = yieldColor(y);
          const total = (wo.good_qty || 0) + (wo.ng_qty || 0);
          return (
            <div key={wo.id} style={{ background: y !== null && y < 90 ? "rgba(239,68,68,0.06)" : "rgba(255,255,255,0.03)", border:`1px solid ${y !== null && y < 90 ? "rgba(239,68,68,0.25)" : "rgba(255,255,255,0.08)"}`, borderRadius:12, padding:"14px 18px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap", marginBottom:10 }}>
                <div style={{ flex:1, minWidth:200 }}>
                  <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4 }}>
                    <span style={{ fontWeight:700, color:"#fb923c", fontFamily:"monospace", fontSize:13 }}>{wo.wo_no}</span>
                    <Badge color={statusColor(wo.wo_status)}>{statusLabel(wo.wo_status)}</Badge>
                  </div>
                  <div style={{ fontSize:12, color:"#64748b" }}>計畫：{wo.planned_qty || 0} PCS　開始：{wo.start_date || "-"}　完成：{wo.finish_date || "-"}</div>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => { setEditModal(wo); setForm({ good: wo.good_qty || 0, ng: wo.ng_qty || 0, status: wo.wo_status }); }} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.14)", borderRadius:8, color:"#94a3b8", cursor:"pointer", padding:"6px 14px", fontSize:12 }}>更新數量</button>
                  {y !== null && y < 90 && <button onClick={() => openCreateNc(wo)} style={{ background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, color:"#fca5a5", cursor:"pointer", padding:"6px 14px", fontSize:12, fontWeight:600 }}>開立 NC</button>}
                </div>
              </div>
              <div style={{ display:"flex", gap:20, fontSize:12, color:"#94a3b8", marginBottom:8, flexWrap:"wrap" }}>
                <span>良品：<b style={{ color:"#22c55e" }}>{wo.good_qty || 0}</b></span>
                <span>不良：<b style={{ color:"#ef4444" }}>{wo.ng_qty || 0}</b></span>
                <span>已入庫：<b style={{ color:"#60a5fa" }}>{total}</b> / {wo.planned_qty || 0}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ flex:1, height:8, background:"rgba(255,255,255,0.07)", borderRadius:4, overflow:"hidden" }}>
                  <div style={{ width: y !== null ? y + "%" : "0%", height:"100%", background:yc, borderRadius:4, transition:"width 0.4s" }} />
                </div>
                <span style={{ fontSize:13, fontWeight:700, color:yc, minWidth:48, textAlign:"right" }}>{y !== null ? y + "%" : "—"}</span>
              </div>
            </div>
          );
        })}
      </div>
      {editModal && (
        <Modal title={`更新數量：${editModal.wo_no}`} onClose={() => setEditModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>良品數量</div><input type="number" min="0" value={form.good} onChange={e=>setForm(p=>({...p,good:e.target.value}))} style={erpInputStyle} /></div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>不良品數量</div><input type="number" min="0" value={form.ng} onChange={e=>setForm(p=>({...p,ng:e.target.value}))} style={erpInputStyle} /></div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>工單狀態</div>
              <select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))} style={erpInputStyle}>
                {["draft","released","in_progress","completed","closed"].map(s => <option key={s} value={s}>{statusLabel(s)}</option>)}
              </select>
            </div>
            <div style={{ background:"rgba(249,115,22,0.08)", borderRadius:8, padding:10, fontSize:12, color:"#fb923c" }}>
              良率預覽：{(() => { const g=parseFloat(form.good)||0; const n=parseFloat(form.ng)||0; const t=g+n; return t>0 ? Math.round(g/t*1000)/10+"%" : "—（尚無數量）"; })()}
            </div>
            <button onClick={handleUpdate} disabled={busy} style={{ background:"linear-gradient(135deg,#ea580c,#f97316)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"11px 24px", fontSize:14, fontWeight:700 }}>{busy ? "儲存中..." : "✓ 確認更新"}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── 庫存管理面板 ─────────────────────────────────────────────────────────────
function ErpInventoryPanel() {
  const [invSub, setInvSub] = useState("locations");
  const [locations, setLocations] = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [balances, setBalances] = useState([]);
  const [loading, setLoading] = useState(true);
  const [txModal, setTxModal] = useState(false);
  const [locModal, setLocModal] = useState(null);  // null=關閉, {}=新增, {id,...}=編輯
  const [txForm, setTxForm] = useState({ trx_type:"IN", item_type:"product", item_ref_id:"", lot_no:"", qty:"", location_code:"", inventory_status:"available", trx_date:"" });
  const [locForm, setLocForm] = useState({ location_code:"", location_name:"", location_type:"warehouse", is_hold_area:false });
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const loadAll = () => {
    setLoading(true);
    Promise.all([
      erpApiJson("/api/inventory/locations?limit=100").then(r => setLocations(r.data?.items || [])),
      erpApiJson("/api/inventory/transactions?limit=100").then(r => setTransactions(r.data?.items || [])),
      erpApiJson("/api/inventory/balances").then(r => setBalances(r.data?.items || [])),
    ]).finally(() => setLoading(false));
  };
  useEffect(loadAll, []);

  async function handleAddTransaction() {
    setBusy(true); setMsg("");
    try {
      await erpApiJson("/api/inventory/transactions", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ ...txForm, qty: parseFloat(txForm.qty) || 0, trx_date: txForm.trx_date || undefined }),
      });
      setTxModal(false);
      setTxForm({ trx_type:"IN", item_type:"product", item_ref_id:"", lot_no:"", qty:"", location_code:"", inventory_status:"available", trx_date:"" });
      setMsg("交易記錄已新增。");
      erpApiJson("/api/inventory/transactions?limit=100").then(r => setTransactions(r.data?.items || []));
      erpApiJson("/api/inventory/balances").then(r => setBalances(r.data?.items || []));
    } catch(e) { setMsg("新增失敗：" + e.message); }
    finally { setBusy(false); }
  }

  async function handleSaveLocation() {
    setBusy(true); setMsg("");
    try {
      if (locModal.id) {
        await erpApiJson(`/api/inventory/locations/${locModal.id}`, { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify(locForm) });
      } else {
        await erpApiJson("/api/inventory/locations", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(locForm) });
      }
      setLocModal(null);
      setMsg(locModal.id ? "已更新位置。" : "已新增位置。");
      erpApiJson("/api/inventory/locations?limit=100").then(r => setLocations(r.data?.items || []));
    } catch(e) { setMsg("操作失敗：" + e.message); }
    finally { setBusy(false); }
  }

  async function handleDeleteLocation(id) {
    if (!window.confirm("確定刪除此庫存位置？")) return;
    try {
      await erpApiJson(`/api/inventory/locations/${id}`, { method:"DELETE" });
      setLocations(prev => prev.filter(l => l.id !== id));
      setMsg("已刪除位置。");
    } catch(e) { setMsg("刪除失敗：" + e.message); }
  }

  const invSubTabs = [{ id:"locations",label:"庫存位置",color:"#06b6d4"},{id:"transactions",label:"交易記錄",color:"#8b5cf6"},{id:"balances",label:"庫存結餘",color:"#22c55e"}];
  const trxTypeLabel = t => ({ IN:"入庫", OUT:"出庫", SCRAP:"報廢", QC:"品管", MOVE:"移倉" }[t] || t);
  const invStatusLabel = s => ({ available:"可用", hold:"待檢", blocked:"禁用" }[s] || s);
  const invStatusColor = s => ({ available:"#22c55e", hold:"#eab308", blocked:"#ef4444" }[s] || "#64748b");

  if (loading) return <div style={{ color:"#64748b", padding:40, textAlign:"center" }}>載入庫存資料中...</div>;

  return (
    <div>
      <SectionHeader title="庫存管理" count={locations.length} color="#06b6d4" />
      {msg && <div style={{ marginBottom:14, padding:"10px 16px", background:"rgba(6,182,212,0.08)", border:"1px solid rgba(6,182,212,0.25)", borderRadius:8, color:"#22d3ee", fontSize:13 }}>{msg}</div>}
      <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap" }}>
        {invSubTabs.map(t => (
          <button key={t.id} onClick={() => setInvSub(t.id)} style={{ padding:"7px 18px", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer", background: invSub===t.id ? `rgba(${t.id==="locations"?"6,182,212":t.id==="transactions"?"139,92,246":"34,197,94"},0.2)` : "rgba(255,255,255,0.05)", border:`1px solid ${invSub===t.id?t.color+"66":"rgba(255,255,255,0.1)"}`, color: invSub===t.id ? t.color : "#64748b" }}>{t.label}</button>
        ))}
      </div>

      {invSub === "locations" && (
        <div>
          <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
            <button onClick={() => { setLocModal({}); setLocForm({ location_code:"", location_name:"", location_type:"warehouse", is_hold_area:false }); }} style={{ background:"linear-gradient(135deg,#0891b2,#06b6d4)", border:"none", borderRadius:8, color:"#fff", cursor:"pointer", padding:"8px 18px", fontSize:13, fontWeight:700 }}>新增位置</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {locations.map(loc => (
              <div key={loc.id} style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${loc.is_hold_area?"rgba(234,179,8,0.3)":"rgba(255,255,255,0.08)"}`, borderRadius:10, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, color:"#e2e8f0", fontSize:13 }}>{loc.location_name}</div>
                  <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{loc.location_code} · {loc.location_type}</div>
                </div>
                {loc.is_hold_area && <Badge color="#eab308">待檢區</Badge>}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => { setLocModal(loc); setLocForm({ location_code:loc.location_code, location_name:loc.location_name, location_type:loc.location_type, is_hold_area:loc.is_hold_area }); }} style={{ background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.14)", borderRadius:6, color:"#94a3b8", cursor:"pointer", padding:"5px 12px", fontSize:12 }}>編輯</button>
                  <button onClick={() => handleDeleteLocation(loc.id)} style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.25)", borderRadius:6, color:"#fca5a5", cursor:"pointer", padding:"5px 12px", fontSize:12 }}>刪除</button>
                </div>
              </div>
            ))}
            {locations.length === 0 && <div style={{ color:"#64748b", fontSize:13, padding:20, textAlign:"center" }}>尚無庫存位置，請先新增</div>}
          </div>
        </div>
      )}

      {invSub === "transactions" && (
        <div>
          <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
            <button onClick={() => setTxModal(true)} style={{ background:"linear-gradient(135deg,#7c3aed,#8b5cf6)", border:"none", borderRadius:8, color:"#fff", cursor:"pointer", padding:"8px 18px", fontSize:13, fontWeight:700 }}>新增交易</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {transactions.map(tx => (
              <div key={tx.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                <div style={{ minWidth:80 }}><Badge color={tx.trx_type==="IN"?"#22c55e":tx.trx_type==="SCRAP"?"#ef4444":"#60a5fa"}>{trxTypeLabel(tx.trx_type)}</Badge></div>
                <div style={{ flex:1, minWidth:160 }}>
                  <div style={{ fontSize:12, fontFamily:"monospace", color:"#94a3b8" }}>{tx.trx_no}</div>
                  <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>{tx.item_type} · {tx.location_code || "-"} · {tx.lot_no || "無批號"}</div>
                </div>
                <div style={{ textAlign:"right", minWidth:80 }}>
                  <div style={{ fontWeight:700, color: tx.qty >= 0 ? "#22c55e" : "#ef4444", fontSize:14 }}>{tx.qty >= 0 ? "+" : ""}{tx.qty}</div>
                  <div style={{ fontSize:11, color:"#64748b" }}>{tx.trx_date || "-"}</div>
                </div>
                <Badge color={invStatusColor(tx.inventory_status)}>{invStatusLabel(tx.inventory_status)}</Badge>
              </div>
            ))}
            {transactions.length === 0 && <div style={{ color:"#64748b", fontSize:13, padding:20, textAlign:"center" }}>尚無交易記錄</div>}
          </div>
        </div>
      )}

      {invSub === "balances" && (
        <div>
          <div style={{ display:"flex", gap:12, marginBottom:16, flexWrap:"wrap" }}>
            <StatCard label="可用庫存" value={balances.filter(b=>b.inventory_status==="available").reduce((s,b)=>s+b.balance,0)} color="#22c55e" />
            <StatCard label="待檢庫存" value={balances.filter(b=>b.inventory_status==="hold").reduce((s,b)=>s+b.balance,0)} color="#eab308" sub="待品管放行" />
            <StatCard label="禁用庫存" value={balances.filter(b=>b.inventory_status==="blocked").reduce((s,b)=>s+b.balance,0)} color="#ef4444" />
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {balances.map((b, i) => (
              <div key={i} style={{ background:`rgba(${b.inventory_status==="hold"?"234,179,8":b.inventory_status==="blocked"?"239,68,68":"34,197,94"},0.05)`, border:`1px solid rgba(${b.inventory_status==="hold"?"234,179,8":b.inventory_status==="blocked"?"239,68,68":"34,197,94"},0.2)`, borderRadius:10, padding:"12px 16px", display:"flex", alignItems:"center", gap:14 }}>
                <Badge color={invStatusColor(b.inventory_status)}>{invStatusLabel(b.inventory_status)}</Badge>
                <div style={{ flex:1, fontSize:12, color:"#94a3b8" }}>{b.item_type} · {b.item_ref_id?.slice(0,8) || "-"} · {b.location_code || "—"}</div>
                <div style={{ fontWeight:800, fontSize:18, color: invStatusColor(b.inventory_status) }}>{b.balance}</div>
              </div>
            ))}
            {balances.length === 0 && <div style={{ color:"#64748b", fontSize:13, padding:20, textAlign:"center" }}>尚無庫存結餘資料</div>}
          </div>
        </div>
      )}

      {txModal && (
        <Modal title="新增庫存交易" onClose={() => setTxModal(false)}>
          <div style={{ display:"flex", flexDirection:"column", gap:13 }}>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>交易類型</div>
              <select value={txForm.trx_type} onChange={e=>setTxForm(p=>({...p,trx_type:e.target.value}))} style={erpInputStyle}>
                {["IN","OUT","SCRAP","QC","MOVE"].map(t=><option key={t} value={t}>{trxTypeLabel(t)}</option>)}
              </select>
            </div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>項目類型</div>
              <select value={txForm.item_type} onChange={e=>setTxForm(p=>({...p,item_type:e.target.value}))} style={erpInputStyle}>
                {["product","material","work_order"].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>項目 ID / 參考編號</div><input value={txForm.item_ref_id} onChange={e=>setTxForm(p=>({...p,item_ref_id:e.target.value}))} style={erpInputStyle} placeholder="產品/物料/工單 UUID" /></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>數量（OUT/SCRAP 填負數）</div><input type="number" value={txForm.qty} onChange={e=>setTxForm(p=>({...p,qty:e.target.value}))} style={erpInputStyle} /></div>
              <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>庫存狀態</div>
                <select value={txForm.inventory_status} onChange={e=>setTxForm(p=>({...p,inventory_status:e.target.value}))} style={erpInputStyle}>
                  {["available","hold","blocked"].map(s=><option key={s} value={s}>{invStatusLabel(s)}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>地點代碼</div>
                <select value={txForm.location_code} onChange={e=>setTxForm(p=>({...p,location_code:e.target.value}))} style={erpInputStyle}>
                  <option value="">（選擇地點）</option>
                  {locations.map(l=><option key={l.id} value={l.location_code}>{l.location_name}</option>)}
                </select>
              </div>
              <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>批號</div><input value={txForm.lot_no} onChange={e=>setTxForm(p=>({...p,lot_no:e.target.value}))} style={erpInputStyle} placeholder="選填" /></div>
            </div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>交易日期（留空＝今日）</div><input type="date" value={txForm.trx_date} onChange={e=>setTxForm(p=>({...p,trx_date:e.target.value}))} style={erpInputStyle} /></div>
            <button onClick={handleAddTransaction} disabled={busy} style={{ background:"linear-gradient(135deg,#7c3aed,#8b5cf6)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"11px 24px", fontSize:14, fontWeight:700 }}>{busy?"新增中...":"✓ 確認新增"}</button>
          </div>
        </Modal>
      )}

      {locModal !== null && (
        <Modal title={locModal.id ? "編輯庫存位置" : "新增庫存位置"} onClose={() => setLocModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:13 }}>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>位置代碼（必填）</div><input value={locForm.location_code} onChange={e=>setLocForm(p=>({...p,location_code:e.target.value}))} style={erpInputStyle} /></div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>位置名稱（必填）</div><input value={locForm.location_name} onChange={e=>setLocForm(p=>({...p,location_name:e.target.value}))} style={erpInputStyle} /></div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>位置類型</div>
              <select value={locForm.location_type} onChange={e=>setLocForm(p=>({...p,location_type:e.target.value}))} style={erpInputStyle}>
                {["warehouse","production","qc","hold","scrap"].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:13, color:"#e2e8f0", cursor:"pointer" }}>
              <input type="checkbox" checked={locForm.is_hold_area} onChange={e=>setLocForm(p=>({...p,is_hold_area:e.target.checked}))} style={{ width:15, height:15, accentColor:"#eab308" }} />
              標示為待檢區（品管用）
            </label>
            <button onClick={handleSaveLocation} disabled={busy} style={{ background:"linear-gradient(135deg,#0891b2,#06b6d4)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"11px 24px", fontSize:14, fontWeight:700 }}>{busy?"儲存中...":"✓ 確認儲存"}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/**
 * ErpResourcePanel — 通用 ERP 主資料面板
 * @param {string}   apiPath   ERP API 路徑，例如 "/api/master/products"
 * @param {string}   title     區塊標題
 * @param {string}   color     主題色
 * @param {Array}    columns   表格欄位 [{ key, label, render? }]
 * @param {Array}    formFields 表單欄位 [{ key, label, type, options? }]
 * @param {Object}   emptyForm 空白表單預設值
 */
function ErpResourcePanel({ apiPath, title, color, columns, formFields, emptyForm }) {
  const [rows, setRows]     = useState([]);
  const [total, setTotal]   = useState(0);
  const [q, setQ]           = useState("");
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]       = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [editRow, setEditRow] = useState(null);   // null = add, object = edit
  const [form, setForm]     = useState(emptyForm);
  const [busy, setBusy]     = useState(false);

  async function load(search = q) {
    setLoading(true);
    try {
      const body = await erpApiJson(`${apiPath}?limit=100&q=${encodeURIComponent(search)}`);
      setRows(body.data?.items || []);
      setTotal(body.data?.total ?? (body.data?.items?.length ?? 0));
    } catch (e) { setMsg("讀取失敗：" + e.message); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  function openAdd() { setForm(emptyForm); setEditRow(null); setShowAdd(true); setMsg(""); }
  function openEdit(row) {
    const f = {};
    formFields.forEach(({ key }) => { f[key] = row[key] ?? ""; });
    setForm(f); setEditRow(row); setShowAdd(true); setMsg("");
  }

  async function handleSave() {
    setBusy(true); setMsg("");
    try {
      if (editRow) {
        await erpApiJson(`${apiPath}/${editRow.id}`, { method:"PATCH", body: JSON.stringify(form) });
        setMsg("已更新。");
      } else {
        await erpApiJson(apiPath, { method:"POST", body: JSON.stringify(form) });
        setMsg("已新增。");
      }
      setShowAdd(false);
      load();
    } catch (e) { setMsg("存檔失敗：" + e.message); }
    finally { setBusy(false); }
  }

  async function handleDelete(row) {
    if (!window.confirm(`確定要刪除「${row[columns[1]?.key] || row.id}」嗎？`)) return;
    setBusy(true);
    try {
      await erpApiJson(`${apiPath}/${row.id}`, { method:"DELETE" });
      setMsg("已刪除。");
      load();
    } catch (e) { setMsg("刪除失敗：" + e.message); }
    finally { setBusy(false); }
  }

  return (
    <div style={{ marginBottom: 32 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:4, height:20, borderRadius:2, background:color }} />
          <span style={{ fontSize:16, fontWeight:800, color:"#e2e8f0" }}>{title}</span>
          <span style={{ fontSize:12, color:"#64748b" }}>共 {total} 筆</span>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==="Enter" && load(q)}
            placeholder="關鍵字搜尋…" style={{ ...erpInputStyle, width:180 }} />
          <button onClick={() => load(q)} style={{ padding:"8px 14px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, color:"#94a3b8", cursor:"pointer", fontSize:12 }}>搜尋</button>
          <button onClick={openAdd} style={{ padding:"8px 16px", background:`linear-gradient(135deg,${color},${color}cc)`, border:"none", borderRadius:8, color:"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>+ 新增</button>
        </div>
      </div>
      {msg && <div style={{ padding:"8px 12px", background: msg.includes("失敗") ? "rgba(239,68,68,0.1)" : "rgba(34,197,94,0.1)", border:`1px solid ${msg.includes("失敗") ? "rgba(239,68,68,0.3)" : "rgba(34,197,94,0.3)"}`, borderRadius:8, fontSize:12, color: msg.includes("失敗") ? "#fca5a5" : "#86efac", marginBottom:10 }}>{msg}</div>}
      <div style={{ overflowX:"auto", borderRadius:12, border:"1px solid rgba(255,255,255,0.07)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"rgba(255,255,255,0.04)" }}>
              {columns.map(col => <th key={col.key} style={{ textAlign:"left", padding:"10px 14px", color:"#64748b", fontWeight:600, whiteSpace:"nowrap", borderBottom:"1px solid rgba(255,255,255,0.07)" }}>{col.label}</th>)}
              <th style={{ padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.07)", width:100 }}></th>
            </tr>
          </thead>
          <tbody>
            {loading ? (
              <tr><td colSpan={columns.length + 1} style={{ padding:24, textAlign:"center", color:"#64748b" }}>讀取中…</td></tr>
            ) : rows.length === 0 ? (
              <tr><td colSpan={columns.length + 1} style={{ padding:24, textAlign:"center", color:"#64748b" }}>尚無資料，請點「新增」建立第一筆。</td></tr>
            ) : rows.map((row, i) => (
              <tr key={row.id} style={{ background: i%2===0 ? "transparent" : "rgba(255,255,255,0.02)", transition:"background 0.15s" }}>
                {columns.map(col => <td key={col.key} style={{ padding:"10px 14px", color:"#e2e8f0", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>{col.render ? col.render(row[col.key], row) : (row[col.key] ?? "—")}</td>)}
                <td style={{ padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={() => openEdit(row)} style={{ padding:"4px 10px", background:"rgba(255,255,255,0.07)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:6, color:"#94a3b8", cursor:"pointer", fontSize:11 }}>編輯</button>
                    <button onClick={() => handleDelete(row)} style={{ padding:"4px 10px", background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.25)", borderRadius:6, color:"#fca5a5", cursor:"pointer", fontSize:11 }}>刪除</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {showAdd && (
        <Modal title={editRow ? `編輯 ${title}` : `新增 ${title}`} onClose={() => setShowAdd(false)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {formFields.map(({ key, label, type, options }) => (
              <div key={key}>
                <div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>{label}</div>
                {options ? (
                  <select value={form[key] ?? ""} onChange={e => setForm({...form, [key]: e.target.value})} style={erpInputStyle}>
                    {options.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                ) : (
                  <input type={type || "text"} value={form[key] ?? ""} onChange={e => setForm({...form, [key]: e.target.value})} style={erpInputStyle} />
                )}
              </div>
            ))}
            <button onClick={handleSave} disabled={busy}
              style={{ padding:"11px 24px", background:`linear-gradient(135deg,${color},${color}cc)`, border:"none", borderRadius:10, color:"#fff", cursor: busy ? "not-allowed" : "pointer", fontSize:14, fontWeight:700, marginTop:4, opacity: busy ? 0.6 : 1 }}>
              {busy ? "儲存中…" : editRow ? "確認更新" : "確認新增"}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ErpUserPanel() {
  const emptyForm = { emp_no:"", name:"", email:"", password:"", role_id:"" };
  const [users, setUsers] = useState([]);
  const [roles, setRoles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [message, setMessage] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [editModal, setEditModal] = useState(null);
  const [resetModal, setResetModal] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [resetPwd, setResetPwd] = useState("");
  const [busy, setBusy] = useState("");

  useEffect(() => { loadAll(); }, []);

  async function loadAll() {
    setLoading(true);
    try {
      const [uRes, rRes] = await Promise.all([
        erpApiJson("/api/auth/users"),
        erpApiJson("/api/master/roles"),
      ]);
      setUsers(uRes.data?.items || []);
      setRoles(rRes.data?.items || []);
    } catch(err) { setMessage("載入失敗：" + err.message); }
    finally { setLoading(false); }
  }

  async function handleAdd() {
    if (!form.emp_no.trim() || !form.name.trim() || !form.password) { setMessage("員工編號、姓名、密碼為必填"); return; }
    setBusy("add");
    try {
      await erpApiJson("/api/auth/users", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(form) });
      setMessage("已新增使用者。"); setShowAdd(false); setForm(emptyForm); loadAll();
    } catch(err) { setMessage("新增失敗：" + err.message); } finally { setBusy(""); }
  }

  async function handleUpdateRole(user, role_id) {
    try {
      await erpApiJson("/api/auth/users/" + user.id, { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ role_id: role_id || null }) });
      setMessage("角色已更新。"); setEditModal(null); loadAll();
    } catch(err) { setMessage("更新失敗：" + err.message); }
  }

  async function handleToggleActive(user) {
    try {
      await erpApiJson("/api/auth/users/" + user.id, { method:"PATCH", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ is_active: !user.is_active }) });
      setMessage(user.is_active ? "帳號已停用。" : "帳號已啟用。"); setEditModal(null); loadAll();
    } catch(err) { setMessage("操作失敗：" + err.message); }
  }

  async function handleResetPwd() {
    if (!resetPwd.trim()) { setMessage("新密碼不可空白"); return; }
    setBusy("reset");
    try {
      await erpApiJson("/api/auth/users/" + resetModal.id + "/reset-password", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ new_password: resetPwd }) });
      setMessage("密碼已重設。"); setResetModal(null); setResetPwd("");
    } catch(err) { setMessage("重設失敗：" + err.message); } finally { setBusy(""); }
  }

  async function handleDelete(user) {
    if (!window.confirm(`確定要刪除帳號「${user.emp_no} ${user.name}」嗎？此操作無法還原。`)) return;
    try {
      await erpApiJson("/api/auth/users/" + user.id, { method:"DELETE" });
      setMessage("已刪除帳號。"); setEditModal(null); loadAll();
    } catch(err) { setMessage("刪除失敗：" + err.message); }
  }

  const activeCount = users.filter(u => u.is_active).length;

  return (
    <div>
      <div style={{ display:"flex", gap:12, marginBottom:20, flexWrap:"wrap" }}>
        <StatCard label="全部帳號" value={users.length} color="#6366f1" />
        <StatCard label="啟用中" value={activeCount} color="#22c55e" />
        <StatCard label="已停用" value={users.length - activeCount} color="#64748b" />
        <StatCard label="角色數" value={roles.length} color="#8b5cf6" />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
        <div style={{ fontSize:12, color:"#94a3b8" }}>{message || "管理系統帳號、指派角色、重設密碼。"}</div>
        <button onClick={() => { setShowAdd(true); setForm(emptyForm); setMessage(""); }} style={{ background:"linear-gradient(135deg,#4f46e5,#6366f1)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"9px 18px", fontSize:13, fontWeight:700 }}>新增帳號</button>
      </div>
      {loading ? <div style={{ color:"#64748b", fontSize:13, padding:20 }}>載入中...</div> : (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead><tr>{["員工編號","姓名","Email","角色","狀態","操作"].map(h=>(
              <th key={h} style={{ textAlign:"left", padding:"10px 12px", color:"#64748b", fontWeight:600, borderBottom:"1px solid rgba(255,255,255,0.06)", whiteSpace:"nowrap" }}>{h}</th>
            ))}</tr></thead>
            <tbody>
              {users.map((u,i) => (
                <tr key={u.id} style={{ background:i%2===0?"rgba(255,255,255,0.02)":"transparent" }}>
                  <td style={{ padding:"10px 12px", color:"#818cf8", fontWeight:700, fontFamily:"monospace" }}>{u.emp_no}</td>
                  <td style={{ padding:"10px 12px", color:"#e2e8f0", fontWeight:600 }}>{u.name}</td>
                  <td style={{ padding:"10px 12px", color:"#64748b", fontSize:12 }}>{u.email || "—"}</td>
                  <td style={{ padding:"10px 12px" }}><Badge color="#8b5cf6">{u.role_name || "未指派"}</Badge></td>
                  <td style={{ padding:"10px 12px" }}><Badge color={u.is_active?"#22c55e":"#64748b"}>{u.is_active?"啟用":"停用"}</Badge></td>
                  <td style={{ padding:"10px 12px" }}>
                    <div style={{ display:"flex", gap:6 }}>
                      <button onClick={()=>setEditModal(u)} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:6, color:"#94a3b8", cursor:"pointer", padding:"4px 10px", fontSize:11 }}>管理</button>
                      <button onClick={()=>{setResetModal(u);setResetPwd("");setMessage("");}} style={{ background:"rgba(99,102,241,0.1)", border:"1px solid rgba(99,102,241,0.25)", borderRadius:6, color:"#a5b4fc", cursor:"pointer", padding:"4px 10px", fontSize:11 }}>重設密碼</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {users.length===0 && <div style={{ color:"#64748b", fontSize:13, padding:20, textAlign:"center" }}>尚無帳號資料</div>}
        </div>
      )}
      {showAdd && (
        <Modal title="新增系統帳號" onClose={()=>setShowAdd(false)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {[["員工編號（必填）","emp_no","text"],["姓名（必填）","name","text"],["Email","email","email"],["登入密碼（必填）","password","password"]].map(([label,key,type])=>(
              <div key={key}><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>{label}</div>
              <input type={type} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} style={inputStyle} /></div>
            ))}
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>角色（系統權限）</div>
              <select value={form.role_id} onChange={e=>setForm(f=>({...f,role_id:e.target.value}))} style={inputStyle}>
                <option value="">— 不指派 —</option>
                {roles.map(r=><option key={r.id} value={r.id}>{r.role_name}</option>)}
              </select>
            </div>
            <button onClick={handleAdd} disabled={busy==="add"} style={{ background:"linear-gradient(135deg,#4f46e5,#6366f1)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"12px 24px", fontSize:15, fontWeight:700, marginTop:8, opacity:busy==="add"?0.6:1 }}>
              {busy==="add"?"新增中...":"確認新增"}
            </button>
          </div>
        </Modal>
      )}
      {editModal && (
        <Modal title={`管理帳號：${editModal.emp_no}`} onClose={()=>setEditModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {[["員工編號",editModal.emp_no],["姓名",editModal.name],["Email",editModal.email||"—"],["目前狀態",editModal.is_active?"啟用中":"已停用"]].map(([k,v])=>(
              <div key={k} style={{ display:"flex", gap:12 }}><div style={{ fontSize:12, color:"#64748b", minWidth:80 }}>{k}</div><div style={{ color:"#e2e8f0", fontWeight:600, fontSize:13 }}>{v}</div></div>
            ))}
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>角色</div>
              <select defaultValue={editModal.role_id} onChange={e=>handleUpdateRole(editModal, e.target.value)} style={inputStyle}>
                <option value="">— 不指派 —</option>
                {roles.map(r=><option key={r.id} value={r.id}>{r.role_name}</option>)}
              </select>
            </div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:8 }}>
              <button onClick={()=>handleToggleActive(editModal)} style={{ background:editModal.is_active?"rgba(239,68,68,0.14)":"rgba(34,197,94,0.14)", border:`1px solid ${editModal.is_active?"rgba(239,68,68,0.3)":"rgba(34,197,94,0.3)"}`, borderRadius:10, color:editModal.is_active?"#fca5a5":"#86efac", cursor:"pointer", padding:"12px 20px", fontSize:13, fontWeight:700 }}>
                {editModal.is_active?"停用帳號":"啟用帳號"}
              </button>

            </div>
          </div>
        </Modal>
      )}
      {resetModal && (
        <Modal title={`重設密碼：${resetModal.emp_no} ${resetModal.name}`} onClose={()=>setResetModal(null)}>
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            <div style={{ background:"rgba(250,204,21,0.08)", border:"1px solid rgba(250,204,21,0.2)", borderRadius:8, padding:10, fontSize:12, color:"#fde68a" }}>重設後舊密碼立即失效，請通知帳號擁有者。</div>
            <div><div style={{ fontSize:12, color:"#64748b", marginBottom:5 }}>新密碼</div>
              <input type="password" value={resetPwd} onChange={e=>setResetPwd(e.target.value)} placeholder="請輸入新密碼" style={inputStyle} /></div>
            <button onClick={handleResetPwd} disabled={busy==="reset"} style={{ background:"linear-gradient(135deg,#4f46e5,#6366f1)", border:"none", borderRadius:10, color:"#fff", cursor:"pointer", padding:"12px 24px", fontSize:15, fontWeight:700, opacity:busy==="reset"?0.6:1 }}>
              {busy==="reset"?"重設中...":"確認重設密碼"}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── DASHBOARD HOME ───────────────────────────────────────────────────────────
function DashboardHome({ instruments, documents, training, equipment, suppliers, nonConformances, auditPlans, envRecords, setActiveTab }) {
  const now = new Date(); now.setHours(0,0,0,0);
  // 由 calibratedDate + intervalDays 計算下次校正日
  function instNextCalDate(inst) {
    if (inst.nextCalibration) return inst.nextCalibration; // 若已有直接用
    if (!inst.calibratedDate || !inst.intervalDays) return null;
    const d = _parseLocalDate(inst.calibratedDate);
    if (!d) return null;
    d.setDate(d.getDate() + inst.intervalDays);
    return d.toISOString().slice(0, 10);
  }
  const overdueInst = instruments.filter(i => daysUntil(instNextCalDate(i)) < 0).length;
  const upcomingInst = instruments.filter(i => { const d=daysUntil(instNextCalDate(i)); return d>=0&&d<=30; }).length;
  const overdueDoc = documents.filter(d => daysUntil(d.nextReview) < 0).length;
  const expiredTrain = training.filter(t => daysUntil(t.validUntil) < 0).length;
  const overdueEquip = equipment.filter(e => daysUntil(e.nextMaintenance) < 0).length;
  const openNc = nonConformances.filter(n => n.status !== "已關閉").length;
  const overdueNc = nonConformances.filter(n => n.status !== "已關閉" && daysUntil(n.dueDate) < 0).length;
  const upcomingAudit = auditPlans.filter(a => a.status === "計畫中" && daysUntil(a.scheduledDate) >= 0 && daysUntil(a.scheduledDate) <= 30).length;
  const envPassRate = envRecords.length > 0 ? Math.round(envRecords.filter(r => r.result === "合格").length / envRecords.length * 100) : 0;
  const poorSupplier = suppliers.filter(s => s.score < 70).length;
  const alerts = [];
  if (overdueInst > 0) alerts.push({ type: "error", msg: `有 ${overdueInst} 個量測儀器校正逾期，請立即安排送校` });
  if (upcomingInst > 0) alerts.push({ type: "warn", msg: `有 ${upcomingInst} 個量測儀器將於 30 天內到期校正` });
  if (overdueDoc > 0) alerts.push({ type: "error", msg: `有 ${overdueDoc} 份文件已逾複審期限` });
  if (expiredTrain > 0) alerts.push({ type: "error", msg: `有 ${expiredTrain} 名人員訓練認證已過期` });
  if (overdueEquip > 0) alerts.push({ type: "error", msg: `有 ${overdueEquip} 台設備保養逾期` });
  if (overdueNc > 0) alerts.push({ type: "error", msg: `有 ${overdueNc} 個不符合項目已逾期未關閉` });
  if (upcomingAudit > 0) alerts.push({ type: "warn", msg: `${upcomingAudit} 場內部稽核將於 30 天內執行` });
  if (poorSupplier > 0) alerts.push({ type: "warn", msg: `有 ${poorSupplier} 家供應商評分不足 70 分` });
  if (envPassRate < 90) alerts.push({ type: "warn", msg: `潔淨室環境合格率僅 ${envPassRate}%` });
  const kpis = [
    { label: "校正儀器", value: instruments.length, sub: overdueInst > 0 ? `${overdueInst}個逾期` : "全部正常", color: overdueInst > 0 ? "#ef4444" : "#60a5fa", tab: "calibration" },
    { label: "程序文件", value: documents.length, sub: overdueDoc > 0 ? `${overdueDoc}份逾期` : "全部有效", color: overdueDoc > 0 ? "#ef4444" : "#22c55e", tab: "documents" },
    { label: "訓練記錄", value: training.length, sub: expiredTrain > 0 ? `${expiredTrain}人過期` : "全部有效", color: expiredTrain > 0 ? "#ef4444" : "#22c55e", tab: "training" },
    { label: "設備保養", value: equipment.length, sub: overdueEquip > 0 ? `${overdueEquip}台逾期` : "全部正常", color: overdueEquip > 0 ? "#ef4444" : "#22c55e", tab: "equipment" },
    { label: "供應商", value: suppliers.length, sub: poorSupplier > 0 ? `${poorSupplier}家評分不足` : "全部合格", color: poorSupplier > 0 ? "#eab308" : "#22c55e", tab: "supplier" },
    { label: "不符合項", value: nonConformances.length, sub: openNc > 0 ? `${openNc}個未關閉` : "全部已關閉", color: openNc > 0 ? "#ef4444" : "#22c55e", tab: "nonconformance" },
    { label: "稽核計畫", value: auditPlans.length, sub: upcomingAudit > 0 ? `${upcomingAudit}場30天內執行` : "如期進行", color: upcomingAudit > 0 ? "#f97316" : "#8b5cf6", tab: "auditplan" },
    { label: "環境監測", value: envRecords.length, sub: `合格率 ${envPassRate}%`, color: envPassRate >= 90 ? "#14b8a6" : envPassRate >= 80 ? "#eab308" : "#ef4444", tab: "environment" },
  ];
  return (
    <div>
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 22, fontWeight: 800, color: "#e2e8f0", letterSpacing: 1 }}>潔沛企業有限公司 ISO 9001:2015</div>
        <div style={{ fontSize: 14, color: "#64748b", marginTop: 4 }}>品質管理系統自動稽核主控台 — {new Date().toLocaleDateString("zh-TW", { year:"numeric", month:"long", day:"numeric" })}</div>
      </div>
      {alerts.length > 0 && (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 700, marginBottom: 10 }}>⚠ 系統警示 ({alerts.length})</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {alerts.map((a, i) => (
              <div key={i} style={{ background: a.type==="error"?"rgba(239,68,68,0.08)":"rgba(234,179,8,0.08)", border: `1px solid ${a.type==="error"?"rgba(239,68,68,0.3)":"rgba(234,179,8,0.3)"}`, borderRadius: 10, padding: "10px 16px", fontSize: 13, color: a.type==="error"?"#fca5a5":"#fde68a", display:"flex", alignItems:"center", gap:8 }}>
                <span>{a.type==="error"?"❌":"⚠️"}</span><span>{a.msg}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 14, marginBottom: 28 }}>
        {kpis.map(k => (
          <div key={k.tab} onClick={() => setActiveTab(k.tab)} style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${k.color}40`, borderRadius: 14, padding: "18px 20px", cursor: "pointer", transition: "all 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.background="rgba(255,255,255,0.08)"}
            onMouseLeave={e => e.currentTarget.style.background="rgba(255,255,255,0.04)"} >
            <div style={{ fontSize: 28, fontWeight: 800, color: k.color, lineHeight: 1 }}>{k.value}</div>
            <div style={{ fontSize: 13, color: "#94a3b8", marginTop: 6 }}>{k.label}</div>
            <div style={{ fontSize: 11, color: k.color, marginTop: 4, fontWeight: 600 }}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 14 }}>最近校正到期儀器</div>
          {[...instruments].sort((a,b) => daysUntil(instNextCalDate(a))-daysUntil(instNextCalDate(b))).slice(0,5).map(inst => {
            const nextCal = instNextCalDate(inst);
            return (
            <div key={inst.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <div>
                <div style={{ fontSize:13, color:"#e2e8f0" }}>{inst.name}</div>
                <div style={{ fontSize:11, color:"#64748b" }}>{inst.id}</div>
              </div>
              <Badge color={urgencyColor(daysUntil(nextCal))}>{urgencyLabel(daysUntil(nextCal))}</Badge>
            </div>
          );
          })}
        </div>
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: 20 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#e2e8f0", marginBottom: 14 }}>未關閉不符合項目</div>
          {nonConformances.filter(n => n.status !== "已關閉").slice(0,5).map(nc => (
            <div key={nc.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <div>
                <div style={{ fontSize:12, color:"#e2e8f0" }}>{nc.description.slice(0,20)}{nc.description.length>20?"...":""}</div>
                <div style={{ fontSize:11, color:"#64748b" }}>{nc.id} — {nc.dept}</div>
              </div>
              <Badge color={daysUntil(nc.dueDate)===9999?"#64748b":daysUntil(nc.dueDate)<0?"#ef4444":daysUntil(nc.dueDate)<=7?"#eab308":"#60a5fa"}>{daysUntil(nc.dueDate)===9999?"無到期日":daysUntil(nc.dueDate)<0?"逾期":"剩"+daysUntil(nc.dueDate)+"天"}</Badge>
            </div>
          ))}
          {nonConformances.filter(n=>n.status!=="已關閉").length===0 && <div style={{color:"#22c55e",fontSize:13,marginTop:8}}>✓ 目前沒有未關閉不符合項</div>}
        </div>
      </div>
    </div>
  );
}

// ─── 登入畫面 ────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const [showPw, setShowPw] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setBusy(true); setError("");
    try {
      const resp = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username.trim().toLowerCase(), password }),
      });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "登入失敗");
      localStorage.setItem("qms_token", data.token);
      localStorage.setItem("qms_user", JSON.stringify(data.user));
      onLogin(data.user);
    } catch (err) {
      setError(err.message);
    } finally {
      setBusy(false);
    }
  }

  const accounts = [
    { role:"品管人員",  user:"qms",   pw:"qms1234"   },
    { role:"高階主管",  user:"exec",  pw:"exec1234"  },
    { role:"生產主管",  user:"super", pw:"super1234" },
    { role:"外部稽核員",user:"audit", pw:"audit1234" },
  ];

  return (
    <div style={{ minHeight:"100vh", background:"radial-gradient(circle at top left, rgba(14,165,233,0.08), transparent 26%), linear-gradient(135deg, #08101f 0%, #0b1220 45%, #080d18 100%)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Noto Sans TC', sans-serif" }}>
      <div style={{ width:400 }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ fontSize:13, letterSpacing:2, textTransform:"uppercase", color:"#7dd3fc", fontWeight:800, marginBottom:6 }}>Jepei QMS</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#e2e8f0" }}>潔沛企業有限公司</div>
          <div style={{ fontSize:13, color:"#64748b", marginTop:4 }}>ISO 9001:2015 品質管理系統</div>
        </div>

        {/* 登入表單 */}
        <form onSubmit={handleSubmit} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:16, padding:32 }}>
          <div style={{ fontSize:16, fontWeight:700, color:"#e2e8f0", marginBottom:24 }}>登入系統</div>
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>帳號</div>
            <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="請輸入帳號" autoFocus
              className="qms-input"
              style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"9px 12px", color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" }} />
          </div>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:12, color:"#64748b", marginBottom:6 }}>密碼</div>
            <div style={{ position:"relative" }}>
              <input type={showPw ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} placeholder="請輸入密碼"
                className="qms-input"
                style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"9px 40px 9px 12px", color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" }} />
              <button type="button" onClick={() => setShowPw(p => !p)}
                style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#64748b", cursor:"pointer", fontSize:13, padding:2 }}>
                {showPw ? "隱藏" : "顯示"}
              </button>
            </div>
          </div>
          {error && <div style={{ marginBottom:16, padding:"8px 12px", background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, fontSize:13, color:"#fca5a5" }}>{error}</div>}
          <button type="submit" disabled={busy || !username || !password}
            className="qms-btn"
            style={{ width:"100%", padding:"10px 0", background: busy || !username || !password ? "rgba(255,255,255,0.05)" : "linear-gradient(90deg,#3b82f6,#6366f1)", border:"none", borderRadius:8, color: busy || !username || !password ? "#475569" : "#fff", fontSize:14, fontWeight:700, cursor: busy || !username || !password ? "not-allowed" : "pointer" }}>
            {busy ? "登入中…" : "登入"}
          </button>
        </form>

        {/* 預設帳號提示 */}
        <div style={{ marginTop:20, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, padding:16 }}>
          <div style={{ fontSize:11, color:"#475569", marginBottom:10, fontWeight:600 }}>預設帳號（初次使用請更改密碼）</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 }}>
            {accounts.map(a => (
              <button key={a.user} type="button"
                onClick={() => { setUsername(a.user); setPassword(a.pw); }}
                className="qms-quick-btn"
                style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:8, padding:"6px 10px", textAlign:"left", cursor:"pointer" }}>
                <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600 }}>{a.role}</div>
                <div style={{ fontSize:10, color:"#475569", marginTop:2 }}>{a.user} / {a.pw}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── 更改密碼 Modal ──────────────────────────────────────────────────────────
function ChangePasswordModal({ token, onClose }) {
  const [form, setForm] = useState({ old_password:"", new_password:"", confirm:"" });
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  async function handleSubmit(e) {
    e.preventDefault();
    if (form.new_password !== form.confirm) { setMsg("兩次新密碼不一致"); return; }
    if (form.new_password.length < 6) { setMsg("密碼至少 6 個字元"); return; }
    setBusy(true); setMsg("");
    try {
      const resp = await fetch("/api/auth/change-password", {
        method:"POST",
        headers: { "Content-Type":"application/json", "Authorization":"Bearer " + token },
        body: JSON.stringify({ old_password: form.old_password, new_password: form.new_password }),
      });
      const data = await resp.json();
      if (!data.success) throw new Error(data.error || "更新失敗");
      setMsg("✓ 密碼已更新");
      setTimeout(onClose, 1200);
    } catch(err) {
      setMsg("❌ " + err.message);
    } finally {
      setBusy(false);
    }
  }

  return (
    <div style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <form onSubmit={handleSubmit} style={{ background:"#0f1929", border:"1px solid rgba(255,255,255,0.12)", borderRadius:14, padding:28, width:340 }}>
        <div style={{ fontSize:15, fontWeight:700, color:"#e2e8f0", marginBottom:20 }}>更改密碼</div>
        {["old_password","new_password","confirm"].map(k => (
          <div key={k} style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:"#64748b", marginBottom:4 }}>
              {k === "old_password" ? "舊密碼" : k === "new_password" ? "新密碼" : "確認新密碼"}
            </div>
            <input type="password" value={form[k]} onChange={e => setForm(p => ({...p, [k]: e.target.value}))}
              className="qms-input"
              style={{ width:"100%", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:8, padding:"7px 10px", color:"#e2e8f0", fontSize:13, boxSizing:"border-box", outline:"none" }} />
          </div>
        ))}
        {msg && <div style={{ marginBottom:12, fontSize:12, color: msg.startsWith("✓") ? "#22c55e" : "#fca5a5" }}>{msg}</div>}
        <div style={{ display:"flex", gap:10 }}>
          <button type="submit" disabled={busy} style={{ flex:1, padding:"8px 0", background:"linear-gradient(90deg,#3b82f6,#6366f1)", border:"none", borderRadius:8, color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer" }}>
            {busy ? "更新中…" : "確認更新"}
          </button>
          <button type="button" onClick={onClose} style={{ padding:"8px 16px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#94a3b8", fontSize:13, cursor:"pointer" }}>取消</button>
        </div>
      </form>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  // ── 主題狀態（深色/淺色）────────────────────────────────────
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("qms_theme") !== "light"; } catch { return true; }
  });
  function toggleTheme() {
    setDarkMode(d => {
      const next = !d;
      try { localStorage.setItem("qms_theme", next ? "dark" : "light"); } catch {}
      return next;
    });
  }
  const theme = darkMode ? DARK_THEME : LIGHT_THEME;

  // ── 身份驗證狀態 ──────────────────────────────────────────────
  const [authUser, setAuthUser] = useState(() => {
    try {
      const raw = localStorage.getItem("qms_user");
      if (!raw) return null;
      const u = JSON.parse(raw);
      // 快速驗證 token 仍有效
      const token = localStorage.getItem("qms_token");
      if (!token) return null;
      return u;
    } catch { return null; }
  });
  const [showChangePw, setShowChangePw] = useState(false);

  // 驗證 token 是否仍有效（頁面載入時）
  useEffect(() => {
    const token = localStorage.getItem("qms_token");
    if (!token) { setAuthUser(null); return; }
    fetch("/api/auth/me", { headers: { Authorization: "Bearer " + token } })
      .then(r => r.json())
      .then(d => { if (!d.success) { setAuthUser(null); localStorage.removeItem("qms_token"); localStorage.removeItem("qms_user"); } })
      .catch(() => {});
  }, []);

  function handleLogin(user) { setAuthUser(user); }
  function handleLogout() {
    localStorage.removeItem("qms_token");
    localStorage.removeItem("qms_user");
    setAuthUser(null);
  }

  // ── 主應用狀態（必須在所有提前 return 之前宣告）─────────────────
  const [activeTab, setActiveTab] = useState(() => {
    if (typeof window === "undefined") return "home";
    const params = new URLSearchParams(window.location.search);
    const t = params.get("google") ? "notification" : (params.get("tab") || "home");
    return t || "home";
  });
  const [instruments, setInstruments] = useState(initialInstruments);
  const [documents, setDocuments] = useState(initialDocuments);
  const [training, setTraining] = useState(initialTraining);
  const [equipment, setEquipment] = useState(() => loadStoredState("audit_equipment", initialEquipment));
  const [suppliers, setSuppliers] = useState(initialSuppliers);
  const [nonConformances, setNonConformances] = useState(initialNonConformances);
  const [highlightNcId, setHighlightNcId] = useState(null);
  const [expandNcId, setExpandNcId] = useState(null);
  const [ncPrefill, setNcPrefill] = useState(null);
  const [auditPlans, setAuditPlans] = useState(initialAuditPlans);
  const [envRecords, setEnvRecords] = useState(initialEnvRecords);
  const [prodRecords, setProdRecords] = useState(() => loadStoredState("audit_prodrecords", initialProdRecords));
  const [qualityRecords, setQualityRecords] = useState(() => loadStoredState("audit_qualityrecords", initialQualityRecords));
  const [manuals] = useState(initialManuals);

  useEffect(() => saveStoredState("audit_prodrecords", prodRecords), [prodRecords]);
  useEffect(() => saveStoredState("audit_qualityrecords", qualityRecords), [qualityRecords]);
  useEffect(() => saveStoredState("audit_equipment", equipment), [equipment]);

  // ── ERP 登出事件監聽：Token 過期時自動清除並提示 ─────────
  useEffect(() => {
    function handleErpExpired() {
      clearErpSession();
      alert("ERP 登入已過期，請重新登入 ERP 主資料。");
    }
    window.addEventListener("erp-session-expired", handleErpExpired);
    return () => window.removeEventListener("erp-session-expired", handleErpExpired);
  }, []);

  useEffect(() => {
    if (!authUser) return;
    let cancelled = false;
    async function loadOpsData() {
      try {
        const [ncPayload, auditPayload, envPayload] = await Promise.all([
          apiJson("/api/nonconformances"),
          apiJson("/api/audit-plans"),
          apiJson("/api/environment-records"),
        ]);
        if (cancelled) return;
        setNonConformances(ncPayload.items || []);
        setAuditPlans(auditPayload.items || []);
        setEnvRecords(envPayload.items || []);
      } catch (err) {
        console.warn("Failed to load operation data", err);
      }
    }
    loadOpsData();
    return () => { cancelled = true; };
  }, [authUser]);

  // ── 未登入 → 顯示登入畫面 ────────────────────────────────────
  if (!authUser) return (
    <ThemeContext.Provider value={theme}>
      <GlobalStyles isDark={darkMode} />
      <LoginScreen onLogin={handleLogin} />
    </ThemeContext.Provider>
  );

  const userRole = authUser.role || "qms";
  const allowedTabs = ROLE_TABS[userRole] || ROLE_TABS.qms;

  const allTabs = [
    { id: "home",           label: "主控台",     icon: "⌂" },
    { id: "kpi",            label: "績效儀表板",  icon: "▦" },
    { id: "spc",            label: "SPC 管制圖",  icon: "∿" },
    { id: "calibration",    label: "校正管理",   icon: "◎" },
    { id: "documents",      label: "文件管理",   icon: "≡" },
    { id: "library",        label: "文件庫",     icon: "📂" },
    { id: "training",       label: "訓練管理",   icon: "□" },
    { id: "equipment",      label: "設備保養",   icon: "⚙" },
    { id: "supplier",       label: "供應商管理",  icon: "◈" },
    { id: "nonconformance", label: "不符合管理",  icon: "⚠" },
    { id: "auditplan",      label: "稽核計畫",   icon: "✓" },
    { id: "environment",    label: "環境監測",   icon: "◉" },
    { id: "production",     label: "記錄匯出",   icon: "R" },
    { id: "notification",   label: "通知提醒",   icon: "✉" },
    { id: "aiworkbench",    label: "AI 工作台",  icon: "AI" },
    { id: "report",         label: "稽核報告",   icon: "☰" },
    { id: "erpmaster",      label: "ERP 主資料",  icon: "⊞" },
  ];
  const tabs = allTabs.filter(t => allowedTabs.includes(t.id));

  function setTabSafe(id) { if (allowedTabs.includes(id)) setActiveTab(id); }

  function renderTab() {
    switch(activeTab) {
      case "home":           return <PageErrorBoundary pageName="主控台"><DashboardHome instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} setActiveTab={setTabSafe} /></PageErrorBoundary>;
      case "kpi":            return <PageErrorBoundary pageName="績效儀表板"><KpiDashboard instruments={instruments} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} prodRecords={prodRecords} qualityRecords={qualityRecords} /></PageErrorBoundary>;
      case "spc":            return <PageErrorBoundary pageName="SPC 管制圖"><SpcTab prodRecords={prodRecords} /></PageErrorBoundary>;
      case "calibration":    return <PageErrorBoundary pageName="校正管理"><CalibrationTab instruments={instruments} setInstruments={setInstruments} /></PageErrorBoundary>;
      case "documents":      return <PageErrorBoundary pageName="文件管理"><DocumentsManagerTab documents={documents} setDocuments={setDocuments} manuals={manuals} /></PageErrorBoundary>;
      case "library":        return <PageErrorBoundary pageName="文件庫"><LibraryHierarchyTab documents={documents} manuals={manuals} /></PageErrorBoundary>;
      case "training":       return <PageErrorBoundary pageName="訓練管理"><TrainingTab training={training} setTraining={setTraining} /></PageErrorBoundary>;
      case "equipment":      return <PageErrorBoundary pageName="設備保養" storageKeys={["audit_equipment"]}><EquipmentTab equipment={equipment} setEquipment={setEquipment} /></PageErrorBoundary>;
      case "supplier":       return <PageErrorBoundary pageName="供應商管理"><SupplierTab suppliers={suppliers} setSuppliers={setSuppliers} /></PageErrorBoundary>;
      case "nonconformance": return <PageErrorBoundary pageName="不符合管理"><NonConformanceTab nonConformances={nonConformances} setNonConformances={setNonConformances} highlightNcId={highlightNcId} onHighlightDone={() => setHighlightNcId(null)} expandNcId={expandNcId} onExpandDone={() => setExpandNcId(null)} ncPrefill={ncPrefill} setNcPrefill={setNcPrefill} /></PageErrorBoundary>;
      case "auditplan":      return <PageErrorBoundary pageName="稽核計畫"><AuditPlanTab auditPlans={auditPlans} setAuditPlans={setAuditPlans} /></PageErrorBoundary>;
      case "environment":    return <PageErrorBoundary pageName="環境監測"><EnvironmentTab envRecords={envRecords} setEnvRecords={setEnvRecords} /></PageErrorBoundary>;
      case "production":     return <PageErrorBoundary pageName="記錄匯出" storageKeys={["audit_prodrecords", "audit_qualityrecords"]}><ProductionTab envRecords={envRecords} prodRecords={prodRecords} setProdRecords={setProdRecords} qualityRecords={qualityRecords} setQualityRecords={setQualityRecords} nonConformances={nonConformances} auditPlans={auditPlans} setActiveTab={setTabSafe} setHighlightNcId={setHighlightNcId} setExpandNcId={setExpandNcId} /></PageErrorBoundary>;
      case "notification":   return <PageErrorBoundary pageName="通知提醒"><NotificationTab instruments={instruments} documents={documents} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} /></PageErrorBoundary>;
      case "aiworkbench":    return <PageErrorBoundary pageName="AI 工作台"><AIWorkbenchTab documents={documents} manuals={manuals} nonConformances={nonConformances} /></PageErrorBoundary>;
      case "report":         return <PageErrorBoundary pageName="稽核報告"><ReportTab instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} /></PageErrorBoundary>;
      case "erpmaster":      return <PageErrorBoundary pageName="ERP 主資料"><ErpMasterTab setActiveTab={setTabSafe} setNcPrefill={setNcPrefill} /></PageErrorBoundary>;
      default:               return <PageErrorBoundary pageName="主控台"><DashboardHome instruments={instruments} documents={documents} training={training} equipment={equipment} suppliers={suppliers} nonConformances={nonConformances} auditPlans={auditPlans} envRecords={envRecords} setActiveTab={setTabSafe} /></PageErrorBoundary>;
    }
  }

  const roleColors = { qms:"#3b82f6", executive:"#8b5cf6", supervisor:"#f59e0b", auditor:"#22c55e" };
  const roleColor = roleColors[userRole] || "#64748b";

  return (
    <ThemeContext.Provider value={theme}>
    <GlobalStyles isDark={darkMode} />
    <div style={{ minHeight:"100vh", background: theme.rootBg, color: theme.rootColor, fontFamily:"'Noto Sans TC', sans-serif", transition:"background 0.3s, color 0.3s" }}>
      {showChangePw && <ChangePasswordModal token={localStorage.getItem("qms_token")} onClose={() => setShowChangePw(false)} />}
      <div style={{ position:"sticky", top:0, zIndex:20, background: theme.navBg, borderBottom:`1px solid ${theme.panelBorder}`, backdropFilter:"blur(16px)", padding:"0 24px", boxShadow:"0 10px 30px rgba(2,6,23,0.12)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:18, overflowX:"auto" }}>
          <div style={{ padding:"14px 0", minWidth:170, flexShrink:0 }}>
            <div style={{ fontSize:11, letterSpacing:1.4, textTransform:"uppercase", color: darkMode ? "#7dd3fc" : "#0284c7", fontWeight:800 }}>Jepei QMS</div>
            <div style={{ fontSize:15, color: theme.text, fontWeight:800, marginTop:4 }}>品質稽核工作台</div>
          </div>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              className={`qms-nav-btn${activeTab === t.id ? " qms-nav-active" : ""}`}
              style={{
                background: activeTab === t.id ? (darkMode ? "rgba(56,189,248,0.14)" : "rgba(2,132,199,0.1)") : "transparent",
                border: activeTab === t.id ? (darkMode ? "1px solid rgba(56,189,248,0.28)" : "1px solid rgba(2,132,199,0.3)") : "1px solid transparent",
                cursor:"pointer", padding:"10px 14px", fontSize:12, fontWeight:700,
                color: activeTab === t.id ? (darkMode ? "#dbeafe" : "#0369a1") : theme.textMuted,
                borderRadius:12, whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:8,
                margin:"10px 0",
              }}>
              <span style={{ fontSize:12, minWidth:24, height:24, display:"inline-flex", alignItems:"center", justifyContent:"center", borderRadius:999, background: activeTab === t.id ? "rgba(59,130,246,0.18)" : (darkMode ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.04)") }}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
          {/* 使用者資訊 + 切換主題 + 登出 */}
          <div style={{ marginLeft:"auto", flexShrink:0, display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 12px", background: darkMode ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)", border:`1px solid ${roleColor}30`, borderRadius:10 }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:roleColor }} />
              <div style={{ fontSize:12, color: theme.textMuted }}>{authUser.display}</div>
            </div>
            {/* 主題切換按鈕 */}
            <button onClick={toggleTheme} title={darkMode ? "切換為淺色模式" : "切換為深色模式"}
              className="qms-tool-btn"
              style={{ background: darkMode ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.06)", border:`1px solid ${theme.panelBorder}`, borderRadius:8, padding:"6px 10px", fontSize:14, color: theme.textMuted, cursor:"pointer", lineHeight:1 }}>
              {darkMode ? "☀️" : "🌙"}
            </button>
            <button onClick={() => setShowChangePw(true)}
              className="qms-tool-btn"
              style={{ background: darkMode ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)", border:`1px solid ${theme.panelBorder}`, borderRadius:8, padding:"6px 10px", fontSize:11, color: theme.textMuted, cursor:"pointer" }}>
              改密碼
            </button>
            <button onClick={handleLogout}
              className="qms-logout-btn"
              style={{ background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.25)", borderRadius:8, padding:"6px 12px", fontSize:12, fontWeight:600, color:"#fca5a5", cursor:"pointer" }}>
              登出
            </button>
          </div>
        </div>
      </div>
      <div style={{ maxWidth:1460, margin:"0 auto", padding:"28px 24px 40px" }}>
        <div key={activeTab} className="qms-tab-content">
          {renderTab()}
        </div>
      </div>
    </div>
    </ThemeContext.Provider>
  );
}



    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
